<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Firebase Auth</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body {background:#0b141a;color:#e9edef;padding:20px}
   .container {max-width:1000px;margin:0 auto}
    h1 {color:#00a884;margin-bottom:20px;font-size:1.8rem;border-left:4px solid #00a884;padding-left:15px}
   .card {background:#202c33;border-radius:20px;padding:20px;margin-bottom:20px}
   .card h2 {margin-bottom:15px;font-size:1.3rem;color:#00a884}
   .stats-grid {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:15px;margin-bottom:20px}
   .stat-box {background:#2a3942;padding:15px;border-radius:15px;text-align:center}
   .stat-number {font-size:2rem;font-weight:bold;color:#00a884}
   .stat-label {font-size:0.8rem;color:#8696a0;margin-top:5px}
   .msg-item {background:#2a3942;padding:12px;margin:8px 0;border-radius:12px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
    button {background:#00a884;border:none;padding:8px 16px;border-radius:8px;color:#111b21;font-weight:bold;cursor:pointer;transition:all 0.2s}
    button:hover {background:#00c3a2;transform:scale(1.02)}
   .danger-btn {background:#d32f2f;color:white}
   .danger-btn:hover {background:#f44336}
   .msg-list {max-height:400px;overflow-y:auto}
   .delete-msg {background:#d32f2f;padding:4px 12px;font-size:0.8rem}
   .loading {text-align:center;padding:20px;color:#8696a0}
   .toast {position:fixed;bottom:20px;right:20px;background:#00a884;color:#111b21;padding:10px 20px;border-radius:10px;font-weight:bold;animation:slideIn 0.3s ease;z-index:1000}
    @keyframes slideIn {from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
  </style>
</head>
<body>
<div class="container">
  <h1>🔧 ADMIN CONTROL PANEL</h1>
  <div id="authCheck" class="loading">Checking admin access...</div>

  <div id="adminContent" style="display:none">
    <div class="stats-grid">
      <div class="stat-box"><div class="stat-number" id="onlineUsers">0</div><div class="stat-label">Online Now</div></div>
      <div class="stat-box"><div class="stat-number" id="totalMsgs">0</div><div class="stat-label">Total Messages</div></div>
    </div>

    <div class="card">
      <h2>📨 All Messages</h2>
      <div id="messagesList" class="msg-list loading">Loading messages...</div>
      <div style="margin-top:15px;display:flex;gap:10px;flex-wrap:wrap;">
        <button id="exportChatBtn">📥 Export All Chats</button>
        <button id="clearAllBtn" class="danger-btn">⚠️ Delete All Messages</button>
        <button id="logoutAdminBtn" class="danger-btn">🚪 Logout</button>
      </div>
    </div>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, get, set, remove, onValue } from 'firebase/database';
  import { getAuth, onAuthStateChanged, signOut } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const auth = getAuth(app);
  const messagesRef = ref(db, 'chat_messages');
  const statusRef = ref(db, 'user_status');

  function showToast(message) {
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      document.getElementById('authCheck').innerHTML = '<h2>Please login first at index.html</h2>';
      return;
    }
    if (user.email.toLowerCase()!== "sv@sp.com") {
      document.getElementById('authCheck').innerHTML = '<h2>Access Denied - Admin only</h2>';
      return;
    }
    document.getElementById('authCheck').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    await refreshStats();
    await loadMessages();

    onValue(statusRef, () => refreshStats());
    onValue(messagesRef, () => { refreshStats(); loadMessages(); });
  });

  async function refreshStats() {
    const usersSnap = await get(statusRef);
    const usersStatus = usersSnap.val() || {};
    let online = 0;
    for (let u in usersStatus) if (usersStatus[u]?.online) online++;
    document.getElementById('onlineUsers').innerText = online;

    const msgsSnap = await get(messagesRef);
    const msgs = msgsSnap.val() || {};
    document.getElementById('totalMsgs').innerText = Object.keys(msgs).length;
  }

  async function loadMessages() {
    const msgsSnap = await get(messagesRef);
    const msgs = msgsSnap.val() || {};
    const msgArray = Object.entries(msgs).sort((a,b) => b[1].time - a[1].time).slice(0, 50);
    const container = document.getElementById('messagesList');
    container.innerHTML = '';

    if (msgArray.length === 0) {
      container.innerHTML = '<div style="text-align:center;padding:20px;">No messages yet</div>';
      return;
    }

    for (let [key, msg] of msgArray) {
      const div = document.createElement('div');
      div.className = 'msg-item';
      div.innerHTML = `
        <div style="flex:1">
          <strong>${escapeHtml(msg.sender)}</strong> → ${escapeHtml(msg.receiver || 'all')}<br>
          <span style="font-size:0.8rem">${escapeHtml(msg.text || msg.fileType || 'Media')}</span>
          <div style="font-size:0.7rem;color:#8696a0">${new Date(msg.time).toLocaleString()}</div>
        </div>
        <button class="delete-msg" onclick="window.deleteMessage('${key}')">Delete</button>
      `;
      container.appendChild(div);
    }
  }

  window.deleteMessage = async (key) => {
    if (confirm("Delete this message?")) {
      await remove(ref(db, `chat_messages/${key}`));
      showToast("Message deleted");
    }
  };

  async function exportChats() {
    const msgsSnap = await get(messagesRef);
    const data = { exportedAt: new Date().toISOString(), messages: msgsSnap.val() || {} };
    const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `firebase_chat_export_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Chat exported!");
  }

  async function clearAllMessages() {
    if (confirm("⚠️ DANGER: Delete ALL messages from Firebase? This cannot be undone!")) {
      await set(messagesRef, null);
      showToast("All messages deleted from Firebase");
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  document.getElementById('exportChatBtn').onclick = exportChats;
  document.getElementById('clearAllBtn').onclick = clearAllMessages;
  document.getElementById('logoutAdminBtn').onclick = () => signOut(auth);
</script>
</body>
</html>

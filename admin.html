<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Admin Panel | Firebase Sync</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: #0b141a;
      color: #e9edef;
      padding: 16px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      color: #00a884;
      margin-bottom: 20px;
      font-size: 1.5rem;
      border-left: 4px solid #00a884;
      padding-left: 12px;
    }

    .card {
      background: #202c33;
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 20px;
    }

    .card h2 {
      margin-bottom: 15px;
      font-size: 1.2rem;
      color: #00a884;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 12px;
      margin-bottom: 20px;
    }

    .stat-box {
      background: #2a3942;
      padding: 15px;
      border-radius: 15px;
      text-align: center;
    }

    .stat-number {
      font-size: 1.8rem;
      font-weight: bold;
      color: #00a884;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #8696a0;
      margin-top: 5px;
    }

    .user-item, .msg-item {
      background: #2a3942;
      padding: 12px;
      margin: 8px 0;
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
    }

    input, select {
      background: #111b21;
      border: none;
      padding: 10px 12px;
      border-radius: 10px;
      color: #e9edef;
      font-size: 0.9rem;
    }

    button {
      background: #00a884;
      border: none;
      padding: 10px 18px;
      border-radius: 10px;
      color: #111b21;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      font-size: 0.9rem;
    }

    button:active { transform: scale(0.97); }

    .danger-btn {
      background: #d32f2f;
      color: white;
    }

    .add-user-area {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 15px;
    }

    .add-user-area input {
      flex: 1;
      min-width: 120px;
    }

    .msg-list {
      max-height: 400px;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .delete-msg {
      background: #d32f2f;
      padding: 6px 14px;
      font-size: 0.8rem;
    }

    .code-display {
      font-family: monospace;
      background: #111b21;
      padding: 6px 10px;
      border-radius: 8px;
      font-size: 0.8rem;
      word-break: break-all;
    }

    .loading {
      text-align: center;
      padding: 20px;
      color: #8696a0;
    }

    .toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #00a884;
      color: #111b21;
      padding: 10px 20px;
      border-radius: 30px;
      font-weight: bold;
      font-size: 0.85rem;
      animation: slideUp 0.3s ease;
      z-index: 1000;
      white-space: nowrap;
      max-width: 90%;
      white-space: normal;
      text-align: center;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(100px); opacity: 0; }
      to { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    @media (max-width: 600px) {
      body {
        padding: 12px;
      }
      .card {
        padding: 15px;
      }
      button {
        padding: 8px 14px;
        font-size: 0.85rem;
      }
      .user-item, .msg-item {
        flex-direction: column;
        align-items: flex-start;
      }
      .user-item div:last-child {
        width: 100%;
        display: flex;
        gap: 8px;
      }
      .user-item button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <h1>🔧 ADMIN CONTROL PANEL</h1>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-number" id="totalUsers">0</div>
      <div class="stat-label">Total Users</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="onlineUsers">0</div>
      <div class="stat-label">Online Now</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" id="totalMsgs">0</div>
      <div class="stat-label">Total Messages</div>
    </div>
  </div>

  <div class="card">
    <h2>👥 Manage Users (Saved to Firebase)</h2>
    <div id="usersList" class="loading">Loading users...</div>
    <div class="add-user-area">
      <input type="text" id="newUserName" placeholder="Name">
      <input type="text" id="newUserCode" placeholder="Secret Code (e.g., #123@)">
      <input type="text" id="newUserAvatar" placeholder="Avatar" maxlength="2" value="👤">
      <button id="addUserBtn">➕ Add</button>
    </div>
    <p style="font-size: 0.7rem; color: #8696a0; margin-top: 12px;">✅ Changes save to Firebase (all devices sync)</p>
  </div>

  <div class="card">
    <h2>🔑 Owner Access Code</h2>
    <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
      <input type="text" id="ownerCodeInput" placeholder="New Owner Code" style="flex:1; font-family: monospace;">
      <button id="updateOwnerBtn">Update</button>
    </div>
    <p style="font-size: 0.7rem; color: #8696a0; margin-top: 10px;">Current: <span id="currentOwnerCode" class="code-display">Loading...</span></p>
  </div>

  <div class="card">
    <h2>📨 Recent Messages</h2>
    <div id="messagesList" class="msg-list loading">Loading messages...</div>
    <div style="margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap;">
      <button id="exportChatBtn">📥 Export Chats</button>
      <button id="clearAllBtn" class="danger-btn">⚠️ Delete All</button>
    </div>
  </div>

  <div class="card">
    <h2>📊 Actions</h2>
    <button id="refreshBtn">🔄 Refresh</button>
    <button id="resetUsersBtn" class="danger-btn" style="margin-left: 10px;">Reset Default Users</button>
  </div>
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, get, set, remove, onValue, update } from 'firebase/database';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const messagesRef = ref(db, 'chat_messages');
  const statusRef = ref(db, 'user_status');
  const usersRef = ref(db, 'app_users');
  const ownerCodeRef = ref(db, 'app_settings/owner_code');

  let USERS = {};

  function showToast(message) {
    const existing = document.querySelector('.toast');
    if (existing) existing.remove();
    const toast = document.createElement('div');
    toast.className = 'toast';
    toast.innerText = message;
    document.body.appendChild(toast);
    setTimeout(() => toast.remove(), 3000);
  }

  async function loadUsersFromFirebase() {
    const snap = await get(usersRef);
    if (snap.exists()) {
      USERS = snap.val();
      renderUsers();
      document.getElementById('totalUsers').innerText = Object.keys(USERS).length;
    } else {
      const defaultUsers = {
        "user1": { name: "Shubham", code: "#9569@", avatar: "😎", role: "user" },
        "user2": { name: "Sakshi", code: "#9454@", avatar: "🌸", role: "user" }
      };
      await set(usersRef, defaultUsers);
      USERS = defaultUsers;
      renderUsers();
      document.getElementById('totalUsers').innerText = Object.keys(USERS).length;
      showToast("Default users created");
    }
  }

  async function loadOwnerCode() {
    const snap = await get(ownerCodeRef);
    if (snap.exists()) {
      document.getElementById('currentOwnerCode').innerText = snap.val();
    } else {
      const defaultCode = "#ADMIN@2025";
      await set(ownerCodeRef, defaultCode);
      document.getElementById('currentOwnerCode').innerText = defaultCode;
    }
  }

  async function refreshStats() {
    const usersSnap = await get(statusRef);
    const usersStatus = usersSnap.val() || {};
    let online = 0;
    for (let u in usersStatus) {
      if (usersStatus[u]?.online) online++;
    }
    document.getElementById('onlineUsers').innerText = online;
    
    const msgsSnap = await get(messagesRef);
    const msgs = msgsSnap.val() || {};
    document.getElementById('totalMsgs').innerText = Object.keys(msgs).length;
  }

  function renderUsers() {
    const container = document.getElementById('usersList');
    container.innerHTML = '';
    
    if (Object.keys(USERS).length === 0) {
      container.innerHTML = '<div class="loading">No users found</div>';
      return;
    }
    
    for (let [id, user] of Object.entries(USERS)) {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div style="flex:1">
          <strong>${escapeHtml(user.avatar)} ${escapeHtml(user.name)}</strong>
          <div class="code-display" style="margin-top: 5px;">${escapeHtml(user.code)}</div>
        </div>
        <div style="display: flex; gap: 8px;">
          <button onclick="window.editUser('${id}')">✏️ Edit</button>
          <button class="danger-btn" onclick="window.deleteUser('${id}')">🗑️ Del</button>
        </div>
      `;
      container.appendChild(div);
    }
  }

  window.editUser = async (id) => {
    const user = USERS[id];
    const newName = prompt("Enter new name:", user.name);
    const newCode = prompt("Enter new secret code:", user.code);
    const newAvatar = prompt("Enter avatar emoji:", user.avatar);
    if (newName && newCode) {
      const updatedUser = { ...user, name: newName, code: newCode, avatar: newAvatar || user.avatar };
      await update(ref(db, `app_users/${id}`), updatedUser);
      USERS[id] = updatedUser;
      renderUsers();
      showToast("User updated!");
    }
  };

  window.deleteUser = async (id) => {
    if (confirm(`Delete ${USERS[id].name}?`)) {
      await remove(ref(db, `app_users/${id}`));
      delete USERS[id];
      renderUsers();
      document.getElementById('totalUsers').innerText = Object.keys(USERS).length;
      showToast("User deleted");
    }
  };

  async function loadMessages() {
    const msgsSnap = await get(messagesRef);
    const msgs = msgsSnap.val() || {};
    const msgArray = Object.entries(msgs).sort((a,b) => b[1].time - a[1].time).slice(0, 30);
    const container = document.getElementById('messagesList');
    container.innerHTML = '';
    
    if (msgArray.length === 0) {
      container.innerHTML = '<div class="loading">No messages yet</div>';
      return;
    }
    
    for (let [key, msg] of msgArray) {
      const div = document.createElement('div');
      div.className = 'msg-item';
      div.innerHTML = `
        <div style="flex:1">
          <strong>${escapeHtml(msg.sender)}</strong> → ${escapeHtml(msg.receiver || 'all')}<br>
          <span style="font-size:0.8rem">${escapeHtml(msg.text || msg.fileType || 'Media')}</span>
          <div style="font-size:0.65rem; color:#8696a0; margin-top:4px;">${new Date(msg.time).toLocaleString()}</div>
        </div>
        <button class="delete-msg" onclick="window.deleteMessage('${key}')">Delete</button>
      `;
      container.appendChild(div);
    }
  }

  window.deleteMessage = async (key) => {
    if (confirm("Delete this message?")) {
      await remove(ref(db, `chat_messages/${key}`));
      await loadMessages();
      await refreshStats();
      showToast("Message deleted");
    }
  };

  async function exportChats() {
    const msgsSnap = await get(messagesRef);
    const usersSnap = await get(usersRef);
    const ownerSnap = await get(ownerCodeRef);
    
    const data = {
      exportedAt: new Date().toISOString(),
      users: usersSnap.val() || {},
      ownerCode: ownerSnap.val() || "#ADMIN@2025",
      messages: msgsSnap.val() || {}
    };
    
    const jsonStr = JSON.stringify(data, null, 2);
    const blob = new Blob([jsonStr], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `firebase_chat_export_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast("Chat exported!");
  }

  async function clearAllMessages() {
    if (confirm("⚠️ DELETE ALL messages from Firebase?")) {
      await set(messagesRef, null);
      await loadMessages();
      await refreshStats();
      showToast("All messages deleted");
    }
  }

  async function resetToDefaultUsers() {
    if (confirm("Reset to default users (Shubham & Sakshi)?")) {
      const defaultUsers = {
        "user1": { name: "Shubham", code: "#9569@", avatar: "😎", role: "user" },
        "user2": { name: "Sakshi", code: "#9454@", avatar: "🌸", role: "user" }
      };
      await set(usersRef, defaultUsers);
      USERS = defaultUsers;
      renderUsers();
      document.getElementById('totalUsers').innerText = Object.keys(USERS).length;
      showToast("Users reset to default");
    }
  }

  async function addNewUser() {
    const name = document.getElementById('newUserName').value.trim();
    const code = document.getElementById('newUserCode').value.trim();
    const avatar = document.getElementById('newUserAvatar').value.trim() || "👤";
    
    if (!name || !code) {
      alert("Please enter name and secret code");
      return;
    }
    
    if (!code.match(/^#.*@$/)) {
      alert("Secret code must start with # and end with @");
      return;
    }
    
    const newId = `user_${Date.now()}`;
    const newUser = { name, code, avatar, role: "user" };
    await set(ref(db, `app_users/${newId}`), newUser);
    USERS[newId] = newUser;
    renderUsers();
    document.getElementById('totalUsers').innerText = Object.keys(USERS).length;
    
    document.getElementById('newUserName').value = '';
    document.getElementById('newUserCode').value = '';
    
    showToast(`✅ User "${name}" added`);
  }

  async function updateOwnerCode() {
    const newCode = document.getElementById('ownerCodeInput').value.trim();
    if (!newCode) {
      alert("Enter a new owner code");
      return;
    }
    if (!newCode.match(/^#.*@$/)) {
      alert("Owner code must start with # and end with @");
      return;
    }
    await set(ownerCodeRef, newCode);
    document.getElementById('currentOwnerCode').innerText = newCode;
    document.getElementById('ownerCodeInput').value = '';
    showToast(`Owner code updated`);
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Event listeners
  document.getElementById('addUserBtn').onclick = addNewUser;
  document.getElementById('updateOwnerBtn').onclick = updateOwnerCode;
  document.getElementById('exportChatBtn').onclick = exportChats;
  document.getElementById('clearAllBtn').onclick = clearAllMessages;
  document.getElementById('refreshBtn').onclick = async () => {
    await loadUsersFromFirebase();
    await loadOwnerCode();
    await refreshStats();
    await loadMessages();
    showToast("Refreshed from Firebase");
  };
  document.getElementById('resetUsersBtn').onclick = resetToDefaultUsers;

  // Initial load
  await loadUsersFromFirebase();
  await loadOwnerCode();
  await refreshStats();
  await loadMessages();

  // Real-time listeners
  onValue(usersRef, async () => {
    await loadUsersFromFirebase();
    await refreshStats();
  });
  onValue(statusRef, () => refreshStats());
  onValue(messagesRef, () => {
    refreshStats();
    loadMessages();
  });
  onValue(ownerCodeRef, () => loadOwnerCode());
</script>
</body>
</html>

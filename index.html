<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Secure Payment Gateway</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <link rel="stylesheet" href="css/animation.css" />
    <link rel="stylesheet" href="css/darkmode.css" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
    
    <style>
        /* Emergency loader styles - in case CSS doesn't load */
        #loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #2d3748;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 99999;
            transition: opacity 0.6s ease-out;
        }
        #loader.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 5px solid rgba(255,255,255,0.1);
            border-top: 5px solid #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        #loader p {
            color: #a0aec0;
            margin-top: 20px;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }
        .loader-dots::after {
            content: '';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0% { content: ''; }
            25% { content: '.'; }
            50% { content: '..'; }
            75% { content: '...'; }
        }
    </style>
</head>
<body>
    <!-- Loading Screen -->
    <div id="loader">
        <div class="spinner"></div>
        <p class="loader-dots">Loading Secure Gateway</p>
    </div>

    <!-- Main Container -->
    <div class="container" style="display:none;">
        <header>
            <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='80' height='80' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%23667eea'/><text x='50' y='68' text-anchor='middle' font-size='50' fill='white'>💰</text></svg>" alt="Business Logo" class="logo" />
            <h1>SecurePay</h1>
            <p>Fast &amp; Secure UPI Payments</p>
        </header>

        <main>
            <div class="hero">
                <img src="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='60' height='60' viewBox='0 0 100 100'><rect x='20' y='30' width='60' height='50' rx='8' fill='none' stroke='%23667eea' stroke-width='4'/><rect x='40' y='45' width='20' height='15' rx='3' fill='%23667eea'/><path d='M30 25 L50 10 L70 25' stroke='%23667eea' stroke-width='4' fill='none'/></svg>" alt="Secure" class="secure-badge" />
                <h2>Pay with UPI</h2>
                <p>Instant, secure, and hassle-free payments</p>
                <a href="payment.html" class="btn-primary pulse">Pay Now</a>
            </div>

            <div class="features">
                <div class="feature-card">
                    <h3>⚡ Instant</h3>
                    <p>Payments processed in seconds</p>
                </div>
                <div class="feature-card">
                    <h3>🔒 Secure</h3>
                    <p>Bank-grade encryption</p>
                </div>
                <div class="feature-card">
                    <h3>📱 UPI</h3>
                    <p>All UPI apps supported</p>
                </div>
            </div>
        </main>

        <footer>
            <p>&copy; 2026 SecurePay. All rights reserved.</p>
            <a href="privacy.html">Privacy Policy</a> | 
            <a href="terms.html">Terms</a>
        </footer>
    </div>

    <script>
        // FIX: Immediate loader hide function
        (function hideLoader() {
            // Try to hide loader as soon as possible
            function hideLoaderNow() {
                var loader = document.getElementById('loader');
                var container = document.querySelector('.container');
                
                if (loader) {
                    loader.classList.add('hidden');
                    // After animation, hide completely
                    setTimeout(function() {
                        loader.style.display = 'none';
                    }, 600);
                }
                
                if (container) {
                    container.style.display = 'block';
                }
            }

            // Hide immediately if DOM is ready
            if (document.readyState === 'complete' || document.readyState === 'interactive') {
                hideLoaderNow();
            } else {
                // Wait for DOM to be ready
                document.addEventListener('DOMContentLoaded', hideLoaderNow);
                // Fallback: hide after 2 seconds max
                setTimeout(hideLoaderNow, 2000);
            }
        })();
    </script>

    <!-- Main scripts - loaded after loader is hidden -->
    <script>
        // Additional functionality after page loads
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize any additional features
            console.log('SecurePay loaded successfully');
            
            // Add smooth scroll behavior
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    const target = document.querySelector(this.getAttribute('href'));
                    if (target) {
                        target.scrollIntoView({ behavior: 'smooth' });
                    }
                });
            });

            // Add hover effects to feature cards
            document.querySelectorAll('.feature-card').forEach(card => {
                card.addEventListener('mouseenter', function() {
                    this.style.transform = 'scale(1.05)';
                });
                card.addEventListener('mouseleave', function() {
                    this.style.transform = 'scale(1)';
                });
            });

            // Theme toggle with improved styling
            const toggleBtn = document.createElement('button');
            toggleBtn.className = 'theme-toggle';
            toggleBtn.innerHTML = '🌙';
            toggleBtn.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                background: rgba(255,255,255,0.2);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255,255,255,0.3);
                border-radius: 50%;
                width: 50px;
                height: 50px;
                font-size: 1.5rem;
                cursor: pointer;
                transition: all 0.3s;
                z-index: 1000;
                color: white;
            `;
            toggleBtn.addEventListener('mouseenter', function() {
                this.style.transform = 'scale(1.1)';
            });
            toggleBtn.addEventListener('mouseleave', function() {
                this.style.transform = 'scale(1)';
            });
            toggleBtn.addEventListener('click', function() {
                document.body.classList.toggle('dark-mode');
                this.innerHTML = document.body.classList.contains('dark-mode') ? '☀️' : '🌙';
                localStorage.setItem('darkMode', document.body.classList.contains('dark-mode'));
                
                // Update container background
                const container = document.querySelector('.container');
                if (container) {
                    if (document.body.classList.contains('dark-mode')) {
                        container.style.background = 'rgba(26, 32, 44, 0.95)';
                        container.style.color = '#e2e8f0';
                    } else {
                        container.style.background = 'rgba(255, 255, 255, 0.95)';
                        container.style.color = '#2d3748';
                    }
                }
            });
            document.body.appendChild(toggleBtn);

            // Load dark mode preference
            if (localStorage.getItem('darkMode') === 'true') {
                document.body.classList.add('dark-mode');
                toggleBtn.innerHTML = '☀️';
                const container = document.querySelector('.container');
                if (container) {
                    container.style.background = 'rgba(26, 32, 44, 0.95)';
                    container.style.color = '#e2e8f0';
                }
            }

            // Toast notification system
            function showToast(message, type = 'info') {
                const toast = document.createElement('div');
                toast.style.cssText = `
                    position: fixed;
                    bottom: 30px;
                    right: 30px;
                    padding: 15px 25px;
                    border-radius: 12px;
                    color: white;
                    font-weight: 500;
                    background: ${type === 'success' ? '#48bb78' : type === 'error' ? '#fc8181' : '#4299e1'};
                    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                    transform: translateY(100px);
                    opacity: 0;
                    transition: all 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
                    z-index: 99999;
                    max-width: 350px;
                `;
                toast.textContent = message;
                document.body.appendChild(toast);

                // Show toast
                setTimeout(() => {
                    toast.style.transform = 'translateY(0)';
                    toast.style.opacity = '1';
                }, 100);

                // Hide after 3 seconds
                setTimeout(() => {
                    toast.style.transform = 'translateY(100px)';
                    toast.style.opacity = '0';
                    setTimeout(() => {
                        toast.remove();
                    }, 400);
                }, 3000);
            }

            // Welcome toast
            setTimeout(() => {
                showToast('Welcome to SecurePay! 🚀', 'success');
            }, 1500);

            // Make showToast globally available
            window.showToast = showToast;
        });
    </script>
</body>
</html>

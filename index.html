<!DOCTYPE html>
<html>
<head>
  <title>Private Chat</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box;margin:0;font-family:sans-serif}
    body{background:#0b141a;color:#e9edef;height:100vh}
    #login{display:flex;height:100vh;justify-content:center;align-items:center;background:#111b21}
    .box{background:#202c33;padding:30px;border-radius:8px;text-align:center;min-width:300px}
    .box input{width:100%;padding:12px;margin:10px 0;border:none;border-radius:8px;background:#2a3942;color:#fff}
    .box button{width:100%;padding:12px;border:none;border-radius:8px;background:#00a884;color:#111b21;font-weight:bold}
    #chat{display:none;height:100vh;flex-direction:column}
    #header{background:#202c33;padding:16px;font-weight:bold}
    #messages{flex:1;overflow-y:auto;padding:20px;background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')}
    .msg{margin:8px 0;padding:8px 12px;border-radius:8px;max-width:70%;word-wrap:break-word}
    .me{background:#005c4b;margin-left:auto}
    .other{background:#202c33}
    .name{font-size:12px;color:#8696a0;margin-bottom:2px}
    #input-area{display:flex;padding:10px;background:#202c33}
    #input-area input{flex:1;padding:12px;border:none;border-radius:24px;background:#2a3942;color:#fff;outline:none}
    #input-area button{margin-left:8px;padding:0 20px;border:none;border-radius:24px;background:#00a884;color:#111b21;font-weight:bold}
  </style>
</head>
<body>
  <div id="login">
    <div class="box">
      <h2>🔒 Secret Chat</h2>
      <input id="secretCode" type="password" placeholder="Secret Code Daalo">
      <button onclick="checkCode()">Enter Chat</button>
    </div>
  </div>

  <div id="chat">
    <div id="header">Private Chat</div>
    <div id="messages"></div>
    <div id="input-area">
      <input id="msgInput" placeholder="Message..." onkeydown="if(event.key==='Enter') sendMsg()">
      <button onclick="sendMsg()">Send</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
    import { getDatabase, ref, push, onChildAdded } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js'

    // TUMHARA FIREBASE CONFIG - YE WAHI HAI JO TUMHARI SCREEN PE HAI
    const firebaseConfig = {
      apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
      authDomain: "secret-chat-ce77a.firebaseapp.com",
      databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "secret-chat-ce77a",
      storageBucket: "secret-chat-ce77a.firebasestorage.app",
      messagingSenderId: "332764244582",
      appId: "1:332764244582:web:4f1ecef556ba1853a81ba7",
      measurementId: "G-WL640JLD1Q"
    };
    
    // BAS YE SECRET CODE APNE HISAB SE BADAL DO
    const SECRET = "V"; 

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const messagesRef = ref(db, 'chats');
    let username = "";

    window.checkCode = () => {
      if(document.getElementById('secretCode').value === SECRET){
        username = prompt("Apna nickname daalo:") || "User";
        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        loadMessages();
      } else alert("Galat Code");
    }

    window.sendMsg = () => {
      const text = document.getElementById('msgInput').value.trim();
      if(text) {
        push(messagesRef, {user: username, text: text, time: Date.now()});
        document.getElementById('msgInput').value = '';
      }
    }

    function loadMessages() {
      onChildAdded(messagesRef, (data) => {
        const m = data.val();
        const div = document.createElement('div');
        div.className = 'msg ' + (m.user === username ? 'me' : 'other');
        div.innerHTML = `<div class="name">${m.user}</div>${m.text}`;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      });
    }
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b141a">
  <title>SECURE CHAT</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0b141a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      color: #e9edef;
    }

    /* LOGIN SCREEN */
   .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0f12 0%, #11181f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

   .login-card {
      background: #202c33;
      padding: 2rem 1.5rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 340px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(0,168,132,0.3);
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

   .login-card h1 {
      font-size: 1.8rem;
      text-align: center;
      background: linear-gradient(135deg, #00d4b4, #00a884);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

   .login-card.sub {
      text-align: center;
      color: #8696a0;
      font-size: 0.7rem;
      margin-bottom: 1.5rem;
    }

   .login-card button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 800;
      font-size: 1rem;
      margin-top: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

   .login-card button:active { transform: scale(0.97); }

    /* CHAT CONTAINER */
   .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #0b141a;
      position: relative;
    }

    /* HEADER */
   .chat-header {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3b42;
      flex-shrink: 0;
    }

   .partner-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

   .partner-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #111b21;
      font-weight: bold;
    }

   .partner-details h3 {
      font-size: 1rem;
      font-weight: 600;
    }

   .online-status {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #8696a0;
    }

   .online-dot {
      width: 8px;
      height: 8px;
      background: #00a884;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

   .offline-dot {
      width: 8px;
      height: 8px;
      background: #5e6f7e;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

   .header-btns button {
      background: #2a3942;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #e9edef;
      font-size: 1.2rem;
      cursor: pointer;
    }

    /* MESSAGES AREA */
   .messages-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      -webkit-overflow-scrolling: touch;
    }

   .message {
      max-width: 80%;
      padding: 0.6rem 0.9rem;
      border-radius: 1.2rem;
      animation: fadeMsg 0.2s ease;
      word-wrap: break-word;
    }

    @keyframes fadeMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

   .message.sent {
      background: #005c4b;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

   .message.received {
      background: #202c33;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

   .message-text {
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

   .message-time {
      font-size: 0.6rem;
      color: #8696a0;
      text-align: right;
      margin-top: 0.2rem;
    }

   .media-preview {
      max-width: 200px;
      border-radius: 0.8rem;
      margin-top: 0.3rem;
      cursor: pointer;
    }
   .media-preview img,.media-preview video {
      width: 100%;
      border-radius: 0.8rem;
      max-height: 150px;
      object-fit: cover;
    }
   .voice-note {
      width: 160px;
      margin-top: 0.3rem;
    }

    /* TYPING INDICATOR */
   .typing-badge {
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      color: #00a884;
      font-style: italic;
      height: 28px;
      background: #0b141a;
      flex-shrink: 0;
    }

    /* INPUT AREA */
   .input-area {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      border-top: 1px solid #2e3b42;
      flex-shrink: 0;
    }

   .input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.9rem;
      outline: none;
      min-width: 0;
    }

   .action-btn {
      background: #2a3942;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #e9edef;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

   .action-btn:active { transform: scale(0.95); }
   .send-btn { background: #00a884; color: #111b21; }
   .recording { background: #ff4444!important; animation: blink 0.8s infinite; }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* CUSTOM SCROLLBAR */
   .messages-area::-webkit-scrollbar {
      width: 4px;
    }
   .messages-area::-webkit-scrollbar-track {
      background: #1a252c;
    }
   .messages-area::-webkit-scrollbar-thumb {
      background: #00a884;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✦ SECURE CHAT ✦</h1>
    <div class="sub">PRIVATE • ENCRYPTED • REAL-TIME</div>
    <button id="googleLoginBtn">
      <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#111b21" d="M16.51 8H8.98v3h4.3c-.18 1-.74 1.48-1.6 2.04v2.01h2.6a7.8 7.8 0 0 0 2.38-5.88c0-.57-.05-.66-.15-1.18z"/><path fill="#111b21" d="M8.98 17c2.16 0 3.97-.72 5.3-1.94l-2.6-2a4.8 4.8 0 0 1-7.18-2.54H1.83v2.07A8 8 0 0 0 8.98 17z"/><path fill="#111b21" d="M4.5 10.52a4.8 4.8 0 0 1 0-3.04V5.41H1.83a8 8 0 0 7.18l2.67-2.07z"/><path fill="#111b21" d="M8.98 4.18c1.17 0 2.23.4 3.06 1.2l2.3-2.3A8 8 0 0 0 1.83 5.4L4.5 7.49a4.77 4.77 0 0 1 4.48-3.3z"/></svg>
      Login with Google
    </button>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info">
      <div class="partner-avatar" id="partnerAvatar">?</div>
      <div class="partner-details">
        <h3 id="partnerName">Loading...</h3>
        <div class="online-status" id="onlineStatus">
          <span class="offline-dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    <div class="header-btns">
      <button id="logoutBtn">🚪</button>
    </div>
  </div>

  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>

  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect } from 'firebase/database';
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'firebase/storage';
  import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);
  const provider = new GoogleAuthProvider();

  const users = {
  "sp@sp.com": { name: "Shubham", avatar: "😎" },
  "sv@sv.com": { name: "Sakshi", avatar: "🌸" }
};

  const messagesRef = ref(db, 'chat_messages');
  const statusRef = ref(db, 'user_status');
  const typingRef = ref(db, 'user_typing');

  let currentUser = null;
  let partnerUser = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let typingTimeout = null;
  let isRecording = false;

  // Google Login
  document.getElementById('googleLoginBtn').onclick = () => {
    signInWithPopup(auth, provider).catch(err => {
      alert("Login failed: " + err.message);
    });
  };

  document.getElementById('logoutBtn').onclick = () => signOut(auth);

  // Auto-login check
  onAuthStateChanged(auth, async user => {
    if (user) {
      if (!allowedEmails.includes(user.email)) {
        alert("You are not authorized to use this chat");
        signOut(auth);
        return;
      }

      currentUser = {
        name: user.displayName.split(' ')[0], // First name only
        email: user.email,
        uid: user.uid,
        avatar: user.displayName[0]
      };

      // Auto-assign partner
      const partnerEmail = allowedEmails.find(e => e!== user.email);
      partnerUser = {
        email: partnerEmail,
        uid: btoa(partnerEmail), // Simple UID from email
        name: partnerEmail === allowedEmails[0]? "Partner1" : "Partner2"
      };

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatContainer').style.display = 'flex';
      document.getElementById('partnerName').innerText = partnerUser.name;
      document.getElementById('partnerAvatar').innerText = partnerUser.name[0];

      await set(ref(db, `user_status/${currentUser.uid}`), { online: true, lastSeen: Date.now() });
      onDisconnect(ref(db, `user_status/${currentUser.uid}`)).set({ online: false, lastSeen: Date.now() });

      onValue(ref(db, `user_status/${partnerUser.uid}`), (snap) => {
        const data = snap.val();
        const statusDiv = document.getElementById('onlineStatus');
        if (data && data.online) {
          statusDiv.innerHTML = '<span class="online-dot"></span><span>Online now</span>';
        } else {
          statusDiv.innerHTML = '<span class="offline-dot"></span><span>Offline</span>';
        }
      });

      onValue(ref(db, `user_typing/${partnerUser.uid}`), (snap) => {
        const typing = snap.val();
        document.getElementById('typingBadge').innerHTML = typing? `${partnerUser.name} is typing...` : '';
      });

      loadMessages();

    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('chatContainer').style.display = 'none';
      currentUser = null;
    }
  });

  function loadMessages() {
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      if (!msg) return;

      const isRelevant = (msg.senderUid === currentUser.uid && msg.receiverUid === partnerUser.uid) ||
                         (msg.senderUid === partnerUser.uid && msg.receiverUid === currentUser.uid);

      if (isRelevant) displayMessage(msg);
    });
  }

  function displayMessage(msg) {
    const isMe = (msg.senderUid === currentUser.uid);
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isMe? 'sent' : 'received'}`;

    let content = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;

    if (msg.fileUrl) {
      if (msg.fileType === 'image') {
        content += `<div class="media-preview"><img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')"></div>`;
      } else if (msg.fileType === 'video') {
        content += `<div class="media-preview"><video src="${msg.fileUrl}" controls></video></div>`;
      } else if (msg.fileType === 'audio') {
        content += `<audio class="voice-note" src="${msg.fileUrl}" controls></audio>`;
      }
    }

    content += `<div class="message-time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
    msgDiv.innerHTML = content;

    document.getElementById('messagesArea').appendChild(msgDiv);
  }

  async function sendMessage(text, fileBlob = null, fileType = null) {
    if (!text &&!fileBlob) return;

    let fileUrl = null;

    if (fileBlob) {
      const fileName = `media_${Date.now()}.${fileType === 'image'? 'jpg' : fileType === 'audio'? 'webm' : 'mp4'}`;
      const fileRef = sRef(storage, `chat_files/${currentUser.uid}/${fileName}`);
      await uploadBytes(fileRef, fileBlob);
      fileUrl = await getDownloadURL(fileRef);
    }

    await push(messagesRef, {
      sender: currentUser.name,
      senderUid: currentUser.uid,
      receiverUid: partnerUser.uid,
      text: text || null,
      fileUrl: fileUrl,
      fileType: fileType,
      time: Date.now()
    });

    if (text) document.getElementById('msgInput').value = '';
    await set(ref(db, `user_typing/${currentUser.uid}`), false);
  }

  function sendTyping() {
    if (!currentUser) return;
    set(ref(db, `user_typing/${currentUser.uid}`), true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      set(ref(db, `user_typing/${currentUser.uid}`), false);
    }, 2000);
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.start();
      document.getElementById('voiceBtn').classList.add('recording');

      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        await sendMessage(null, audioBlob, 'audio');
        stream.getTracks().forEach(track => track.stop());
        document.getElementById('voiceBtn').classList.remove('recording');
      };
    } catch(e) {
      alert("Microphone access required");
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  // Auto-scroll on new messages
  new MutationObserver(() => {
    const msgArea = document.getElementById('messagesArea');
    msgArea.scrollTop = msgArea.scrollHeight;
  }).observe(document.getElementById('messagesArea'), {childList: true});

  // Event listeners
  document.getElementById('sendBtn').onclick = () => {
    const text = document.getElementById('msgInput').value.trim();
    if (text) sendMessage(text);
  };

  document.getElementById('msgInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const text = e.target.value.trim();
      if (text) sendMessage(text);
    }
  };

  document.getElementById('msgInput').oninput = sendTyping;
  document.getElementById('attachBtn').onclick = () => document.getElementById('fileUpload').click();

  document.getElementById('fileUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 5 * 1024 * 1024) {
        alert("File too large (max 5MB)");
        return;
      }
      const type = file.type.startsWith('image/')? 'image' : 'video';
      await sendMessage(null, file, type);
    }
    e.target.value = '';
  };

  // Better voice button - works on mobile + desktop
  const voiceBtn = document.getElementById('voiceBtn');
  voiceBtn.addEventListener('pointerdown', e => {
    e.preventDefault();
    if(!isRecording) { startRecording(); isRecording = true; }
  });
  voiceBtn.addEventListener('pointerup', e => {
    e.preventDefault();
    if(isRecording) { stopRecording(); isRecording = false; }
  });
</script>
</body>
</html>

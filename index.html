<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>AROMATIC · Private Chat</title>
  <!-- Firebase SDKs -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0a0f1e;
      font-family: 'Segoe UI', system-ui, -apple-system, 'Inter', sans-serif;
      height: 100vh;
      overflow: hidden;
      color: #eef2ff;
    }

    .app {
      display: flex;
      flex-direction: column;
      height: 100%;
      max-width: 550px;
      margin: 0 auto;
      background: #111827;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      position: relative;
    }

    /* Auth Screen */
    .auth-container {
      padding: 2rem 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      height: 100%;
      background: linear-gradient(145deg, #0f172a, #0a0f1e);
    }

    .auth-card {
      background: #1e293b;
      border-radius: 2rem;
      padding: 2rem 1.5rem;
      box-shadow: 0 20px 35px -12px rgba(0,0,0,0.5);
    }

    .auth-title {
      font-size: 1.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 0.25rem;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .auth-sub {
      text-align: center;
      color: #94a3b8;
      margin-bottom: 2rem;
      font-size: 0.85rem;
    }

    input {
      width: 100%;
      padding: 14px 18px;
      margin: 8px 0;
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 1.2rem;
      color: white;
      font-size: 1rem;
      outline: none;
      transition: 0.2s;
    }

    input:focus {
      border-color: #f59e0b;
      box-shadow: 0 0 0 2px rgba(245,158,11,0.3);
    }

    button {
      background: #f59e0b;
      border: none;
      padding: 12px;
      width: 100%;
      border-radius: 2rem;
      font-weight: bold;
      font-size: 1rem;
      color: #0f172a;
      margin-top: 1rem;
      cursor: pointer;
      transition: 0.2s;
    }

    button:active { transform: scale(0.97); }
    .error-msg { color: #f87171; font-size: 0.8rem; margin-top: 0.5rem; text-align: center; }

    /* Chat Container */
    .chat-container {
      display: flex;
      flex-direction: column;
      height: 100%;
      display: none;
    }

    .chat-header {
      background: #1e293b;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #334155;
    }

    .logo {
      font-weight: 800;
      font-size: 1.4rem;
      background: linear-gradient(135deg, #fbbf24, #f59e0b);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .user-badge {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 0.8rem;
      background: #0f172a;
      padding: 5px 12px;
      border-radius: 40px;
    }

    .online-dot {
      width: 10px;
      height: 10px;
      background-color: #22c55e;
      border-radius: 50%;
      display: inline-block;
      box-shadow: 0 0 4px #22c55e;
    }

    .members-panel {
      background: #0f172a;
      border-bottom: 1px solid #334155;
      padding: 8px 16px;
      overflow-x: auto;
      white-space: nowrap;
      display: flex;
      gap: 12px;
      scrollbar-width: thin;
    }

    .member-chip {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: #1e293b;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.8rem;
    }

    .member-chip.admin {
      background: #f59e0b20;
      border: 1px solid #f59e0b;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #0f172a;
    }

    .message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 1.5rem;
      word-wrap: break-word;
    }

    .message-sent {
      background: #f59e0b;
      color: #0c0a2a;
      align-self: flex-end;
      border-bottom-right-radius: 5px;
    }

    .message-received {
      background: #1e293b;
      align-self: flex-start;
      border-bottom-left-radius: 5px;
    }

    .msg-meta {
      font-size: 0.65rem;
      opacity: 0.7;
      margin-top: 4px;
      display: flex;
      gap: 8px;
      justify-content: flex-end;
    }

    .media-msg {
      max-width: 220px;
      border-radius: 1rem;
      margin-top: 5px;
      cursor: pointer;
    }

    .typing-indicator {
      font-size: 0.75rem;
      color: #94a3b8;
      margin: 6px 12px;
      font-style: italic;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .input-bar {
      background: #1e293b;
      padding: 12px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-top: 1px solid #334155;
    }

    .input-bar input {
      flex: 1;
      margin: 0;
      background: #0f172a;
      border-radius: 2rem;
      padding: 12px 16px;
    }

    .icon-btn {
      background: transparent;
      width: auto;
      margin: 0;
      padding: 10px;
      font-size: 1.4rem;
      color: #fbbf24;
    }

    .lastseen-toast {
      font-size: 0.7rem;
      color: #9ca3af;
      margin-left: 12px;
    }

    @media (max-width: 550px) {
      .message { max-width: 90%; }
    }
  </style>
</head>
<body>
<div class="app" id="app">
  <!-- Auth Panel -->
  <div id="authPanel" class="auth-container">
    <div class="auth-card">
      <div class="auth-title">✨ AROMATIC</div>
      <div class="auth-sub">private circle · approved access only</div>
      <input type="email" id="loginEmail" placeholder="Your email" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="Password">
      <button id="loginBtn">🔐 Enter Chat Room</button>
      <div id="authError" class="error-msg"></div>
      <div style="font-size:0.7rem; text-align:center; margin-top:1rem;">Only authorized emails can login</div>
    </div>
  </div>

  <!-- Main Chat Interface -->
  <div id="chatContainer" class="chat-container">
    <div class="chat-header">
      <span class="logo">🌿 AROMATIC · room</span>
      <div class="user-badge">
        <span id="myEmailShort"></span>
        <span class="online-dot"></span>
        <button id="logoutBtn" style="background: none; width: auto; margin:0; padding:0 6px; color:#f87171;" class="icon-btn"><i class="fas fa-sign-out-alt"></i></button>
      </div>
    </div>
    <div class="members-panel" id="membersList"></div>
    <div id="typingStatusArea" class="typing-indicator"></div>
    <div class="messages-area" id="messagesArea"></div>
    <div class="input-bar">
      <button id="attachMediaBtn" class="icon-btn"><i class="fas fa-image"></i></button>
      <button id="attachAudioBtn" class="icon-btn"><i class="fas fa-microphone"></i></button>
      <input type="text" id="messageInput" placeholder="Message...">
      <button id="sendBtn" class="icon-btn"><i class="fas fa-paper-plane"></i></button>
    </div>
    <input type="file" id="fileImageInput" accept="image/*,video/mp4" style="display:none">
    <input type="file" id="fileAudioInput" accept="audio/*" style="display:none">
  </div>
</div>

<script>
  // Your Firebase configuration (already inserted!)
  const firebaseConfig = {
    apiKey: "AIzaSyBdA8ntd9HFmADRPuyaOvh00WN4KkPYw-4",
    authDomain: "personal-chat-4628d.firebaseapp.com",
    projectId: "personal-chat-4628d",
    storageBucket: "personal-chat-4628d.firebasestorage.app",
    messagingSenderId: "1033665500663",
    appId: "1:1033665500663:web:e0399ffa0ba609ac230af2",
    measurementId: "G-2JMZWFJ33E"
  };

  // Initialize Firebase
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();
  const storage = firebase.storage();

  // ALLOWED USERS - Only these emails can login
  // IMPORTANT: You must create these users in Firebase Authentication Console!
  const ALLOWED_USERS = new Map([
    ["admin@admin.com", { name: "AROMATIC", role: "admin" }],  // YOU - Admin
    ["sp@sp.com", { name: "SP", role: "member" }],            // Friend 1
    ["sv@sv.com", { name: "SV", role: "member" }]             // Friend 2
  ]);

  let currentUser = null;
  let messagesUnsub = null;
  let typingTimeout = null;
  let onlineStatusInterval = null;

  // Check if email is allowed
  function isEmailAllowed(email) {
    return ALLOWED_USERS.has(email?.toLowerCase());
  }

  // Create user profile in Firestore
  async function ensureUserProfile(user) {
    if (!user) return;
    const userRef = db.collection("users").doc(user.uid);
    const docSnap = await userRef.get();
    const userData = ALLOWED_USERS.get(user.email.toLowerCase());
    if (!docSnap.exists) {
      await userRef.set({
        uid: user.uid,
        email: user.email,
        displayName: userData?.name || user.email.split('@')[0],
        role: userData?.role || "member",
        online: true,
        lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
    } else {
      await userRef.update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
    }
    return userRef;
  }

  // Authentication State Listener
  auth.onAuthStateChanged(async (user) => {
    if (user && isEmailAllowed(user.email)) {
      currentUser = user;
      await ensureUserProfile(user);
      document.getElementById("authPanel").style.display = "none";
      document.getElementById("chatContainer").style.display = "flex";
      const userData = ALLOWED_USERS.get(user.email.toLowerCase());
      document.getElementById("myEmailShort").innerHTML = `${userData?.name || user.email.split('@')[0]} ${userData?.role === 'admin' ? '👑' : ''}`;
      startRealtimeFeatures();
      loadMembersAndMessages();
      setUserOnlineStatus(true);
      
      if (onlineStatusInterval) clearInterval(onlineStatusInterval);
      onlineStatusInterval = setInterval(() => {
        if (currentUser) db.collection("users").doc(currentUser.uid).update({ online: true, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
      }, 20000);
    } else if (user && !isEmailAllowed(user.email)) {
      await auth.signOut();
      document.getElementById("authError").innerText = "⛔ Your email is not authorized. Contact AROMATIC.";
      document.getElementById("chatContainer").style.display = "none";
      document.getElementById("authPanel").style.display = "flex";
    } else {
      document.getElementById("authPanel").style.display = "flex";
      document.getElementById("chatContainer").style.display = "none";
      if (messagesUnsub) messagesUnsub();
    }
  });

  // Login
  document.getElementById("loginBtn").addEventListener("click", async () => {
    const email = document.getElementById("loginEmail").value.trim();
    const pwd = document.getElementById("loginPassword").value;
    const errorDiv = document.getElementById("authError");
    if (!email || !pwd) { errorDiv.innerText = "Enter email & password"; return; }
    if (!isEmailAllowed(email)) { errorDiv.innerText = "Access denied: email not authorized."; return; }
    try {
      await auth.signInWithEmailAndPassword(email, pwd);
      errorDiv.innerText = "";
    } catch (err) {
      console.error(err);
      errorDiv.innerText = "Invalid credentials. Make sure this user exists in Firebase Authentication.";
    }
  });

  document.getElementById("logoutBtn").addEventListener("click", () => auth.signOut());

  // Real-time features
  function startRealtimeFeatures() {
    const inputField = document.getElementById("messageInput");
    inputField.addEventListener("input", () => {
      if (!currentUser) return;
      const typingRef = db.collection("status").doc("typing");
      typingRef.set({
        [currentUser.uid]: true,
        name: getDisplayNameForUser(currentUser),
        timestamp: firebase.firestore.FieldValue.serverTimestamp()
      }, { merge: true });
      if (typingTimeout) clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => {
        typingRef.update({ [currentUser.uid]: false });
      }, 1500);
    });

    db.collection("status").doc("typing").onSnapshot((doc) => {
      const typingData = doc.data() || {};
      const typingUsers = Object.keys(typingData).filter(uid => typingData[uid] === true && uid !== currentUser?.uid);
      const typingArea = document.getElementById("typingStatusArea");
      if (typingUsers.length > 0 && currentUser && ALLOWED_USERS.get(currentUser.email)?.role === "admin") {
        typingArea.innerHTML = `<i class="fas fa-pen-fancy"></i> Someone is typing...`;
      } else {
        typingArea.innerHTML = "";
      }
    });
  }

  function getDisplayNameForUser(user) {
    return ALLOWED_USERS.get(user.email.toLowerCase())?.name || user.email.split('@')[0];
  }

  // Load members and messages
  function loadMembersAndMessages() {
    db.collection("users").onSnapshot((snapshot) => {
      const membersDiv = document.getElementById("membersList");
      let html = '';
      const usersList = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        if (data.email && isEmailAllowed(data.email)) {
          usersList.push({ id: doc.id, ...data });
        }
      });
      usersList.sort((a,b) => a.displayName?.localeCompare(b.displayName));
      usersList.forEach(user => {
        const isAdmin = ALLOWED_USERS.get(user.email)?.role === "admin";
        const onlineStatus = user.online ? '<span class="online-dot"></span>' : '<i class="far fa-circle" style="font-size:8px; color:#64748b;"></i>';
        let lastSeenText = "";
        if (currentUser && ALLOWED_USERS.get(currentUser.email)?.role === "admin" && !user.online && user.lastSeen) {
          const date = user.lastSeen.toDate ? user.lastSeen.toDate() : new Date(user.lastSeen);
          lastSeenText = `<span class="lastseen-toast">last seen ${date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</span>`;
        }
        html += `<div class="member-chip ${isAdmin ? 'admin' : ''}">
                  <strong>${user.displayName || user.email.split('@')[0]}</strong> ${onlineStatus} ${lastSeenText}
                  <span style="font-size:10px; color:#94a3b8;">${user.email}</span>
                </div>`;
      });
      membersDiv.innerHTML = html;
    });

    if (messagesUnsub) messagesUnsub();
    messagesUnsub = db.collection("messages").orderBy("timestamp", "asc").onSnapshot((snapshot) => {
      const container = document.getElementById("messagesArea");
      container.innerHTML = "";
      snapshot.forEach(doc => {
        const msg = doc.data();
        const isOwn = currentUser && msg.senderId === currentUser.uid;
        const msgDiv = document.createElement("div");
        msgDiv.className = `message ${isOwn ? 'message-sent' : 'message-received'}`;
        let contentHTML = '';
        if (msg.type === 'text') {
          contentHTML = `<div>${escapeHtml(msg.text)}</div>`;
        } else if (msg.type === 'image') {
          contentHTML = `<img src="${msg.fileUrl}" class="media-msg" style="max-width:100%; max-height:180px; border-radius:1rem;" onclick="window.open('${msg.fileUrl}')" />`;
        } else if (msg.type === 'audio') {
          contentHTML = `<audio controls src="${msg.fileUrl}" class="audio-msg" style="width:180px;"></audio>`;
        }
        const senderName = msg.senderName || "unknown";
        const timeStr = msg.timestamp ? new Date(msg.timestamp.toDate()).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}) : "";
        msgDiv.innerHTML = `<div style="font-size:0.7rem; opacity:0.8;">${senderName}</div>${contentHTML}<div class="msg-meta">${timeStr}</div>`;
        container.appendChild(msgDiv);
      });
      container.scrollTop = container.scrollHeight;
    });
  }

  function escapeHtml(str) { return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }

  // Send message
  document.getElementById("sendBtn").addEventListener("click", () => sendTextMessage());
  document.getElementById("messageInput").addEventListener("keypress", (e) => { if(e.key === 'Enter') sendTextMessage(); });

  async function sendTextMessage() {
    const input = document.getElementById("messageInput");
    const text = input.value.trim();
    if (!text || !currentUser) return;
    const userData = ALLOWED_USERS.get(currentUser.email.toLowerCase());
    await db.collection("messages").add({
      text: text,
      senderId: currentUser.uid,
      senderName: userData?.name || currentUser.email.split('@')[0],
      type: "text",
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
    input.value = "";
    db.collection("status").doc("typing").update({ [currentUser.uid]: false });
  }

  // Media upload
  async function uploadMedia(file, type) {
    if (!currentUser) return;
    const fileRef = storage.ref(`chat_media/${Date.now()}_${file.name}`);
    await fileRef.put(file);
    const downloadUrl = await fileRef.getDownloadURL();
    const userData = ALLOWED_USERS.get(currentUser.email.toLowerCase());
    await db.collection("messages").add({
      fileUrl: downloadUrl,
      senderId: currentUser.uid,
      senderName: userData?.name || currentUser.email.split('@')[0],
      type: type,
      timestamp: firebase.firestore.FieldValue.serverTimestamp()
    });
  }

  document.getElementById("attachMediaBtn").addEventListener("click", () => {
    document.getElementById("fileImageInput").click();
  });
  document.getElementById("attachAudioBtn").addEventListener("click", () => {
    document.getElementById("fileAudioInput").click();
  });
  document.getElementById("fileImageInput").addEventListener("change", (e) => {
    if (e.target.files.length) {
      const file = e.target.files[0];
      const type = file.type.startsWith('image/') ? 'image' : 'video';
      uploadMedia(file, type);
      e.target.value = '';
    }
  });
  document.getElementById("fileAudioInput").addEventListener("change", (e) => {
    if (e.target.files.length) {
      uploadMedia(e.target.files[0], 'audio');
      e.target.value = '';
    }
  });

  async function setUserOnlineStatus(isOnline) {
    if (!currentUser) return;
    await db.collection("users").doc(currentUser.uid).update({ online: isOnline, lastSeen: firebase.firestore.FieldValue.serverTimestamp() });
  }
  window.addEventListener("beforeunload", () => {
    if (currentUser) db.collection("users").doc(currentUser.uid).update({ online: false });
  });
</script>
</body>
</html>

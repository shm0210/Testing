<!DOCTYPE html>
<html>
<head>
  <title>Secret Chat Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    *{box-sizing:border-box;margin:0;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
    body{background:#0b141a;color:#e9edef;height:100vh}
    #login{display:flex;height:100vh;justify-content:center;align-items:center;background:#111b21}
  .box{background:#202c33;padding:30px;border-radius:12px;text-align:center;min-width:320px}
  .box input{width:100%;padding:14px;margin:12px 0;border:none;border-radius:8px;background:#2a3942;color:#fff;font-size:16px}
  .box button{width:100%;padding:14px;border:none;border-radius:8px;background:#00a884;color:#111b21;font-weight:600;font-size:16px}
    #chat{display:none;height:100vh;flex-direction:column}
    #header{background:#202c33;padding:10px 16px;font-weight:600;display:flex;justify-content:space-between;align-items:center}
    #userInfo{display:flex;align-items:center;gap:10px}
   .avatar{width:40px;height:40px;border-radius:50%;background:#00a884;display:flex;align-items:center;justify-content:center;font-weight:600;color:#111b21}
    #status{font-size:12px;color:#8696a0}
   .online{width:10px;height:10px;background:#00a884;border-radius:50%;display:inline-block;margin-right:4px}
    #messages{flex:1;overflow-y:auto;padding:10px 20px;background-image:url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png')}
  .msg{margin:6px 0;padding:8px 12px;border-radius:8px;max-width:75%;word-wrap:break-word;position:relative}
  .me{background:#005c4b;margin-left:auto}
  .other{background:#202c33}
  .name{font-size:12px;color:#53bdeb;margin-bottom:2px;font-weight:500}
  .time{font-size:11px;color:#8696a0;margin-top:4px;text-align:right}
  .msg img,.msg video{max-width:100%;border-radius:6px;margin-top:4px}
  .msg audio{width:100%;margin-top:4px}
   #typing{padding:0 20px;font-size:12px;color:#8696a0;font-style:italic;height:18px}
    #input-area{display:flex;padding:8px 12px;background:#202c33;align-items:center;gap:8px}
    #input-area input[type=text]{flex:1;padding:12px;border:none;border-radius:24px;background:#2a3942;color:#fff;outline:none}
    #input-area button{border:none;border-radius:50%;width:45px;height:45px;background:#00a884;color:#111b21;font-size:18px;display:flex;align-items:center;justify-content:center}
    #fileInput{display:none}
  .file-btn{background:#2a3942!important}
  .recording{background:#ff4444!important;animation:pulse 1s infinite}
   @keyframes pulse{0%{opacity:1}50%{opacity:0.5}100%{opacity:1}}
  </style>
</head>
<body>
  <div id="login">
    <div class="box">
      <h2>🔒 Secret Chat Pro</h2>
      <input id="secretCode" type="password" placeholder="Secret Code Daalo">
      <button onclick="checkCode()">Enter Chat</button>
    </div>
  </div>

  <div id="chat">
    <div id="header">
      <div id="userInfo">
        <div class="avatar" id="myAvatar"></div>
        <div>
          <div id="chatTitle"></div>
          <div id="status"><span class="online"></span>Online</div>
        </div>
      </div>
    <div id="messages"></div>
    <div id="typing"></div>
    <div id="input-area">
      <input type="file" id="fileInput" accept="image/*,video/*">
      <button class="file-btn" onclick="fileInput.click()">📎</button>
      <input id="msgInput" type="text" placeholder="Message..." oninput="sendTyping()" onkeydown="if(event.key==='Enter') sendMsg()">
      <button id="recordBtn" onmousedown="startRecord()" onmouseup="stopRecord()" ontouchstart="startRecord()" ontouchend="stopRecord()">🎤</button>
      <button onclick="sendMsg()">➤</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js'
    import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, serverTimestamp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js'
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js'

    const firebaseConfig = {
      apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
      authDomain: "secret-chat-ce77a.firebaseapp.com",
      databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "secret-chat-ce77a",
      storageBucket: "secret-chat-ce77a.appspot.com",
      messagingSenderId: "332764244582",
      appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
    };

    // USER CODES - YAHAN ADD/REMOVE KARO
    const USERS = {
      "#9569@": "Shubham",
      "#9454@": "Sakshi"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const messagesRef = ref(db, 'chats');
    const statusRef = ref(db, 'status');
    const typingRef = ref(db, 'typing');

    let username = "", mediaRecorder, audioChunks = [], typingTimeout;

    window.checkCode = () => {
      const code = document.getElementById('secretCode').value;
      if(USERS[code]) {
        username = USERS[code];
        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        document.getElementById('chatTitle').innerText = username;
        document.getElementById('myAvatar').innerText = username[0];
        setOnline();
        loadMessages();
        watchTyping();
      } else alert("Galat Code");
    }

    // Online Status
    function setOnline() {
      const myStatusRef = ref(db, `status/${username}`);
      set(myStatusRef, {online: true, lastSeen: serverTimestamp()});
      onDisconnect(myStatusRef).set({online: false, lastSeen: serverTimestamp()});
    }

    // Typing Indicator
    window.sendTyping = () => {
      set(ref(db, `typing/${username}`), true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => set(ref(db, `typing/${username}`), false), 2000);
    }

    function watchTyping() {
      onValue(typingRef, (snap) => {
        const data = snap.val() || {};
        const typingUsers = Object.keys(data).filter(u => u!== username && data[u]);
        document.getElementById('typing').innerText = typingUsers.length? `${typingUsers[0]} typing...` : '';
      });
    }

    // Voice Recording
    window.startRecord = async () => {
      const stream = await navigator.mediaDevices.getUserMedia({audio: true});
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
      mediaRecorder.start();
      document.getElementById('recordBtn').classList.add('recording');
    }

    window.stopRecord = () => {
      if(mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        document.getElementById('recordBtn').classList.remove('recording');
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, {type: 'audio/webm'});
          const fileRef = sRef(storage, `voice/${Date.now()}.webm`);
          await uploadBytes(fileRef, blob);
          const url = await getDownloadURL(fileRef);
          push(messagesRef, {user: username, time: Date.now(), fileUrl: url, fileType: 'audio'});
        }
      }
    }

    window.sendMsg = async () => {
      const text = document.getElementById('msgInput').value.trim();
      const file = document.getElementById('fileInput').files[0];
      if(!text &&!file) return;

      let fileUrl = null, fileType = null;
      if(file) {
        const fileRef = sRef(storage, `chats/${Date.now()}_${file.name}`);
        await uploadBytes(fileRef, file);
        fileUrl = await getDownloadURL(fileRef);
        fileType = file.type.startsWith('image')? 'image' : 'video';
        document.getElementById('fileInput').value = '';
      }

      push(messagesRef, {user: username, text: text, time: Date.now(), fileUrl, fileType});
      document.getElementById('msgInput').value = '';
      set(ref(db, `typing/${username}`), false);
    }

    function loadMessages() {
      onChildAdded(messagesRef, (data) => {
        const m = data.val();
        const div = document.createElement('div');
        div.className = 'msg ' + (m.user === username? 'me' : 'other');
        let content = `<div class="name">${m.user}</div>`;
        if(m.text) content += m.text;
        if(m.fileUrl) {
          if(m.fileType === 'image') content += `<img src="${m.fileUrl}">`;
          else if(m.fileType === 'video') content += `<video src="${m.fileUrl}" controls></video>`;
          else if(m.fileType === 'audio') content += `<audio src="${m.fileUrl}" controls></audio>`;
        }
        content += `<div class="time">${new Date(m.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
        div.innerHTML = content;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      });
    }

    fileInput.onchange = () => sendMsg();
  </script>
</body>
</html>

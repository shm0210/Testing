<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b141a">
  <title>✦ SECURE CHAT ✦ | Working Chat</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0b141a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      color: #e9edef;
    }

    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0f12 0%, #11181f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-card {
      background: #202c33;
      padding: 2rem 1.5rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 340px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(0,168,132,0.3);
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h1 {
      font-size: 1.8rem;
      text-align: center;
      background: linear-gradient(135deg, #00d4b4, #00a884);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-card .sub {
      text-align: center;
      color: #8696a0;
      font-size: 0.7rem;
      margin-bottom: 1.5rem;
    }

    .login-card input {
      width: 100%;
      padding: 1rem;
      margin: 0.6rem 0;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 1rem;
      text-align: center;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      background: #2f414c;
      box-shadow: 0 0 0 2px #00a884;
    }

    .login-card button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 800;
      font-size: 1rem;
      margin-top: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card button:active { transform: scale(0.97); }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.8rem;
    }
    .success-msg {
      color: #00a884;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.5rem;
    }

    .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #0b141a;
    }

    .chat-header {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3b42;
      flex-shrink: 0;
    }

    .partner-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .partner-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #111b21;
      font-weight: bold;
    }

    .partner-details h3 {
      font-size: 1rem;
      font-weight: 600;
    }

    .online-status {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #8696a0;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #00a884;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .offline-dot {
      width: 8px;
      height: 8px;
      background: #5e6f7e;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-btns button {
      background: #2a3942;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #e9edef;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .message {
      max-width: 75%;
      padding: 0.6rem 1rem;
      border-radius: 1.2rem;
      animation: fadeMsg 0.2s ease;
      word-wrap: break-word;
    }

    @keyframes fadeMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      background: #005c4b;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .message.received {
      background: #202c33;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .message-text {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .message-time {
      font-size: 0.6rem;
      color: #8696a0;
      text-align: right;
      margin-top: 0.3rem;
    }

    .media-preview {
      max-width: 200px;
      border-radius: 0.8rem;
      margin-top: 0.3rem;
      cursor: pointer;
    }
    .media-preview img, .media-preview video {
      width: 100%;
      border-radius: 0.8rem;
      max-height: 150px;
      object-fit: cover;
    }
    .voice-note {
      width: 180px;
      margin-top: 0.3rem;
    }

    .typing-badge {
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      color: #00a884;
      font-style: italic;
      height: 28px;
      background: #0b141a;
      flex-shrink: 0;
    }

    .input-area {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      border-top: 1px solid #2e3b42;
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.95rem;
      outline: none;
    }

    .action-btn {
      background: #2a3942;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #e9edef;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.1s ease;
    }

    .action-btn:active { transform: scale(0.95); }
    .send-btn { background: #00a884; color: #111b21; }
    .recording { background: #ff4444 !important; animation: blink 0.8s infinite; }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }
    .messages-area::-webkit-scrollbar-track {
      background: #1a252c;
    }
    .messages-area::-webkit-scrollbar-thumb {
      background: #00a884;
      border-radius: 4px;
    }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✦ SECURE CHAT ✦</h1>
    <div class="sub">PRIVATE • ENCRYPTED • REAL-TIME</div>
    <input type="email" id="emailInput" placeholder="Email" autocomplete="off">
    <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
    <button id="loginBtn">✦ LOGIN ✦</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info">
      <div class="partner-avatar" id="partnerAvatar">👤</div>
      <div class="partner-details">
        <h3 id="partnerName">Connecting...</h3>
        <div class="online-status" id="onlineStatus">
          <span class="offline-dot"></span>
          <span>Offline</span>
        </div>
      </div>
    </div>
    <div class="header-btns">
      <button id="logoutBtn">🚪</button>
    </div>
  </div>

  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>

  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Type a message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, push, onChildAdded, set, onDisconnect, onValue } from 'firebase/database';
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'firebase/storage';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);

  // User profiles
  const PROFILES = {
    "sp@sv.com": { name: "Shubham", avatar: "😎" },
    "sv@sp.com": { name: "Sakshi", avatar: "🌸" }
  };

  let currentUser = null;
  let partnerEmail = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let typingTimeout = null;
  let isRecording = false;

  async function loginOrCreate(email, password) {
    const errorMsg = document.getElementById('errorMsg');
    const successMsg = document.getElementById('successMsg');
    
    errorMsg.innerText = '';
    successMsg.innerText = '';
    
    const cleanEmail = email.trim().toLowerCase();
    if (!cleanEmail || !password) {
      errorMsg.innerText = '❌ Please enter email and password';
      return false;
    }
    
    if (!PROFILES[cleanEmail]) {
      errorMsg.innerText = '❌ Use sp@sv.com or sv@sp.com';
      return false;
    }
    
    try {
      try {
        await signInWithEmailAndPassword(auth, cleanEmail, password);
        successMsg.innerText = '✓ Login successful!';
        setTimeout(() => successMsg.innerText = '', 1500);
        return true;
      } catch (err) {
        if (err.code === 'auth/invalid-credential' || err.code === 'auth/user-not-found') {
          successMsg.innerText = '🔄 Creating account...';
          await createUserWithEmailAndPassword(auth, cleanEmail, password);
          successMsg.innerText = '✓ Account created! Logging in...';
          await signInWithEmailAndPassword(auth, cleanEmail, password);
          successMsg.innerText = '✓ Login successful!';
          setTimeout(() => successMsg.innerText = '', 1500);
          return true;
        } else {
          throw err;
        }
      }
    } catch (err) {
      if (err.code === 'auth/weak-password') {
        errorMsg.innerText = '❌ Password must be at least 6 characters';
      } else if (err.code === 'auth/wrong-password') {
        errorMsg.innerText = '❌ Wrong password';
      } else {
        errorMsg.innerText = `❌ ${err.message}`;
      }
      return false;
    }
  }

  async function setupChat(user) {
    const userEmail = user.email;
    const profile = PROFILES[userEmail];
    
    if (!profile) {
      await signOut(auth);
      return;
    }
    
    currentUser = {
      uid: user.uid,
      email: userEmail,
      name: profile.name,
      avatar: profile.avatar
    };
    
    // Set partner email
    partnerEmail = userEmail === "sp@sv.com" ? "sv@sp.com" : "sp@sv.com";
    const partnerProfile = PROFILES[partnerEmail];
    
    // Update UI
    document.getElementById('partnerName').innerText = partnerProfile.name;
    document.getElementById('partnerAvatar').innerText = partnerProfile.avatar;
    
    // Set online status
    const userStatusRef = ref(db, `status/${currentUser.uid}`);
    await set(userStatusRef, {
      email: currentUser.email,
      name: currentUser.name,
      online: true,
      lastSeen: Date.now()
    });
    
    onDisconnect(userStatusRef).set({
      email: currentUser.email,
      name: currentUser.name,
      online: false,
      lastSeen: Date.now()
    });
    
    // Monitor partner's online status
    const allStatusRef = ref(db, 'status');
    onValue(allStatusRef, (snapshot) => {
      const statuses = snapshot.val();
      let isPartnerOnline = false;
      
      if (statuses) {
        for (const [uid, data] of Object.entries(statuses)) {
          if (data.email === partnerEmail && data.online === true) {
            isPartnerOnline = true;
            break;
          }
        }
      }
      
      const statusDiv = document.getElementById('onlineStatus');
      if (isPartnerOnline) {
        statusDiv.innerHTML = '<span class="online-dot"></span><span>Online now</span>';
      } else {
        statusDiv.innerHTML = '<span class="offline-dot"></span><span>Offline</span>';
      }
    });
    
    // Monitor partner typing
    const typingRef = ref(db, `typing/${partnerEmail}`);
    onValue(typingRef, (snapshot) => {
      const isTyping = snapshot.val();
      const typingBadge = document.getElementById('typingBadge');
      if (isTyping) {
        typingBadge.innerText = `${partnerProfile.name} is typing...`;
      } else {
        typingBadge.innerText = '';
      }
    });
    
    // Load messages
    const messagesRef = ref(db, 'messages');
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      if (!msg) return;
      
      // Check if message is between current user and partner
      const isBetween = (msg.from === currentUser.email && msg.to === partnerEmail) ||
                        (msg.from === partnerEmail && msg.to === currentUser.email);
      
      if (isBetween) {
        displayMessage(msg);
      }
    });
    
    // Clear messages area and show existing messages
    const messagesArea = document.getElementById('messagesArea');
    messagesArea.innerHTML = '';
  }
  
  function displayMessage(msg) {
    const isMe = msg.from === currentUser.email;
    const messageDiv = document.createElement('div');
    messageDiv.className = `message ${isMe ? 'sent' : 'received'}`;
    
    let content = '';
    
    if (msg.text) {
      content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
    }
    
    if (msg.imageUrl) {
      content += `<div class="media-preview"><img src="${msg.imageUrl}" alt="image" onclick="window.open('${msg.imageUrl}')"></div>`;
    }
    
    if (msg.videoUrl) {
      content += `<div class="media-preview"><video src="${msg.videoUrl}" controls></video></div>`;
    }
    
    if (msg.audioUrl) {
      content += `<audio class="voice-note" src="${msg.audioUrl}" controls></audio>`;
    }
    
    const time = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    content += `<div class="message-time">${time}</div>`;
    
    messageDiv.innerHTML = content;
    
    const messagesArea = document.getElementById('messagesArea');
    messagesArea.appendChild(messageDiv);
    messagesArea.scrollTop = messagesArea.scrollHeight;
  }
  
  async function sendTextMessage(text) {
    if (!text.trim() || !currentUser || !partnerEmail) return;
    
    const message = {
      from: currentUser.email,
      to: partnerEmail,
      text: text.trim(),
      timestamp: Date.now()
    };
    
    const messagesRef = ref(db, 'messages');
    await push(messagesRef, message);
    
    // Clear input
    document.getElementById('msgInput').value = '';
    
    // Stop typing indicator
    await set(ref(db, `typing/${currentUser.email}`), false);
  }
  
  async function sendFile(file, type) {
    if (!currentUser || !partnerEmail) return;
    
    try {
      const fileName = `${Date.now()}_${Math.random().toString(36).substr(2, 6)}`;
      const fileRef = sRef(storage, `files/${fileName}`);
      await uploadBytes(fileRef, file);
      const fileUrl = await getDownloadURL(fileRef);
      
      const message = {
        from: currentUser.email,
        to: partnerEmail,
        timestamp: Date.now()
      };
      
      if (type === 'image') {
        message.imageUrl = fileUrl;
      } else if (type === 'video') {
        message.videoUrl = fileUrl;
      }
      
      const messagesRef = ref(db, 'messages');
      await push(messagesRef, message);
      
    } catch (err) {
      console.error("Upload error:", err);
      alert("Failed to send file: " + err.message);
    }
  }
  
  async function sendAudio(audioBlob) {
    if (!currentUser || !partnerEmail) return;
    
    try {
      const fileName = `audio_${Date.now()}_${Math.random().toString(36).substr(2, 6)}.webm`;
      const audioRef = sRef(storage, `audio/${fileName}`);
      await uploadBytes(audioRef, audioBlob);
      const audioUrl = await getDownloadURL(audioRef);
      
      const message = {
        from: currentUser.email,
        to: partnerEmail,
        audioUrl: audioUrl,
        timestamp: Date.now()
      };
      
      const messagesRef = ref(db, 'messages');
      await push(messagesRef, message);
      
    } catch (err) {
      console.error("Audio upload error:", err);
      alert("Failed to send voice message");
    }
  }
  
  function sendTyping() {
    if (!currentUser) return;
    
    const typingRef = ref(db, `typing/${currentUser.email}`);
    set(typingRef, true);
    
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      set(typingRef, false);
    }, 2000);
  }
  
  async function startVoiceRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      
      mediaRecorder.ondataavailable = (event) => {
        if (event.data.size > 0) {
          audioChunks.push(event.data);
        }
      };
      
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        if (audioBlob.size > 0) {
          await sendAudio(audioBlob);
        }
        stream.getTracks().forEach(track => track.stop());
        const voiceBtn = document.getElementById('voiceBtn');
        voiceBtn.classList.remove('recording');
        isRecording = false;
      };
      
      mediaRecorder.start();
      document.getElementById('voiceBtn').classList.add('recording');
      isRecording = true;
      
      // Auto-stop after 60 seconds
      setTimeout(() => {
        if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
          stopVoiceRecording();
        }
      }, 60000);
      
    } catch (err) {
      console.error("Microphone error:", err);
      alert("Please allow microphone access to send voice messages");
    }
  }
  
  function stopVoiceRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    } else {
      document.getElementById('voiceBtn').classList.remove('recording');
      isRecording = false;
    }
  }
  
  function escapeHtml(str) {
    const div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }
  
  // Auth state listener
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatContainer').style.display = 'flex';
      await setupChat(user);
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('chatContainer').style.display = 'none';
      currentUser = null;
      partnerEmail = null;
      document.getElementById('messagesArea').innerHTML = '';
      document.getElementById('msgInput').value = '';
    }
  });
  
  // Event listeners
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('emailInput').value;
    const password = document.getElementById('passwordInput').value;
    await loginOrCreate(email, password);
  };
  
  document.getElementById('passwordInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      document.getElementById('loginBtn').click();
    }
  };
  
  document.getElementById('sendBtn').onclick = () => {
    const input = document.getElementById('msgInput');
    sendTextMessage(input.value);
  };
  
  document.getElementById('msgInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      sendTextMessage(e.target.value);
    }
  };
  
  document.getElementById('msgInput').oninput = () => {
    sendTyping();
  };
  
  document.getElementById('attachBtn').onclick = () => {
    document.getElementById('fileUpload').click();
  };
  
  document.getElementById('fileUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 5 * 1024 * 1024) {
        alert("File too large (max 5MB)");
        e.target.value = '';
        return;
      }
      
      if (file.type.startsWith('image/')) {
        await sendFile(file, 'image');
      } else if (file.type.startsWith('video/')) {
        await sendFile(file, 'video');
      } else {
        alert("Only images and videos are supported");
      }
    }
    e.target.value = '';
  };
  
  const voiceBtn = document.getElementById('voiceBtn');
  voiceBtn.addEventListener('mousedown', (e) => {
    e.preventDefault();
    if (!isRecording && currentUser) {
      startVoiceRecording();
    }
  });
  voiceBtn.addEventListener('mouseup', () => {
    if (isRecording) {
      stopVoiceRecording();
    }
  });
  voiceBtn.addEventListener('mouseleave', () => {
    if (isRecording) {
      stopVoiceRecording();
    }
  });
  voiceBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!isRecording && currentUser) {
      startVoiceRecording();
    }
  });
  voiceBtn.addEventListener('touchend', () => {
    if (isRecording) {
      stopVoiceRecording();
    }
  });
  
  document.getElementById('logoutBtn').onclick = async () => {
    if (currentUser) {
      await set(ref(db, `status/${currentUser.uid}`), { online: false, lastSeen: Date.now() });
    }
    await signOut(auth);
  };
  
  console.log("✅ Chat ready! Use sp@sv.com or sv@sp.com");
</script>

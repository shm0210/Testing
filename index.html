<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEETORY - Modern Music Player</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="https://i.ibb.co/d0Lw85R6/Picsart-25-08-01-19-18-42-186.png">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="logo-container">
                <img src="https://i.ibb.co/d0Lw85R6/Picsart-25-08-01-19-18-42-186.png" alt="GEETORY Logo" class="logo">
                <h1>GEETORY</h1>
            </div>
            <div class="sidebar-menu">
                <div class="menu-item active" data-page="home">
                    <i class="fas fa-home"></i>
                    <span>Home</span>
                </div>
                <div class="menu-item" data-page="search">
                    <i class="fas fa-search"></i>
                    <span>Search</span>
                </div>
                <div class="menu-item" data-page="playlists">
                    <i class="fas fa-list"></i>
                    <span>Playlists</span>
                </div>
                <div class="menu-item" data-page="profile">
                    <i class="fas fa-user"></i>
                    <span>Profile</span>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Home Page -->
            <div class="page home-page active">
                <h2 class="page-title">All Songs</h2>
                <div class="songs-container">
                    <!-- Songs will be loaded here from JavaScript -->
                </div>
            </div>

            <!-- Search Page -->
            <div class="page search-page">
                <div class="search-header">
                    <h2 class="page-title">Search</h2>
                    <div class="search-box">
                        <i class="fas fa-search"></i>
                        <input type="text" placeholder="Search songs, artists, or albums..." id="search-input">
                    </div>
                </div>
                <div class="search-results">
                    <!-- Search results will appear here -->
                </div>
            </div>

            <!-- Playlists Page -->
            <div class="page playlists-page">
                <h2 class="page-title">Your Playlists</h2>
                <div class="playlists-container">
                    <!-- Playlists will be loaded here -->
                </div>
                <div class="playlist-songs-container" style="display: none;">
                    <div class="playlist-header">
                        <button class="back-button"><i class="fas fa-arrow-left"></i> Back</button>
                        <h3 class="playlist-title"></h3>
                    </div>
                    <div class="playlist-songs-list">
                        <!-- Songs in playlist will appear here -->
                    </div>
                </div>
            </div>

            <!-- Profile Page -->
            <div class="page profile-page">
                <div class="profile-header">
                    <img src="https://via.placeholder.com/150" alt="Profile Picture" class="profile-pic">
                    <h2>SHUBHAM</h2>
                </div>
                <div class="profile-stats">
                    <div class="stat-item">
                        <span class="stat-number">0</span>
                        <span class="stat-label">Playlists</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">0</span>
                        <span class="stat-label">Songs</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-number">0</span>
                        <span class="stat-label">Hours</span>
                    </div>
                </div>
                <div class="recently-played">
                    <h3>Recently Played</h3>
                    <div class="recent-songs">
                        <!-- Recently played songs will appear here -->
                    </div>
                </div>
                <footer class="app-footer">
                    <p>GEETORY Music Player</p>
                    <p>© 2023 All Rights Reserved</p>
                </footer>
            </div>
        </div>

        <!-- Player Controls -->
        <div class="player-container">
            <div class="song-info">
                <img src="" alt="Song Cover" class="song-cover" id="current-song-cover">
                <div class="song-details">
                    <h4 class="song-title" id="current-song-title">No song selected</h4>
                    <p class="song-artist" id="current-song-artist">-</p>
                </div>
            </div>
            <div class="player-controls">
                <button class="control-btn" id="prev-btn"><i class="fas fa-step-backward"></i></button>
                <button class="control-btn play-btn" id="play-btn"><i class="fas fa-play"></i></button>
                <button class="control-btn" id="next-btn"><i class="fas fa-step-forward"></i></button>
            </div>
            <div class="progress-container">
                <span class="time-current" id="current-time">0:00</span>
                <div class="progress-bar">
                    <div class="progress" id="progress"></div>
                </div>
                <span class="time-total" id="total-time">0:00</span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en" class="no-js">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>INFINITY Video Player</title>
  <meta name="description" content="INFINITY Video Player — ad-free YouTube + direct video playback" />
  <meta name="author" content="Shubham" />

  <!-- Inline SVG favicon (infinity) -->
  <link rel="icon" href='data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64"><circle cx="32" cy="32" r="32" fill="%230b8793"/><path d="M18 34c6-10 16-10 22 0 6 10-4 22-22 6" fill="none" stroke="%23fff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/></svg>'>

  <!-- Fonts + icons -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">

  <!-- Particles.js library -->
  <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js" defer></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="background">
    <canvas id="matrix"></canvas>
    <div id="particles-js" aria-hidden="true"></div>
  </div>

  <header class="site-header">
    <div class="title-wrap">
      <h1>INFINITY Video Player</h1>
    </div>

    <div class="owner-profile" title="Shubham - Instagram">
      <a href="https://www.instagram.com/i.shubham0210/" target="_blank" rel="noopener noreferrer">
        <img src="https://i.ibb.co/MkQF0vJ2/IMG-20250915-070304.jpg" alt="Shubham">
        <span>Shubham</span>
        <i class="fab fa-instagram"></i>
      </a>
    </div>
  </header>

  <main class="container">
    <section class="player-card" aria-label="Video player">
      <div class="player-frame">
        <!-- YouTube iframe -->
        <div id="youtube-wrapper" class="player-inner">
          <iframe id="youtube-iframe" src="" frameborder="0" allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen title="YouTube player"></iframe>
        </div>

        <!-- Direct video -->
        <div id="direct-wrapper" class="player-inner" style="display:none;">
          <video id="video" playsinline></video>
        </div>
      </div>

      <div class="controls-area">
        <div class="input-row">
          <input id="video-link" type="text" placeholder="Paste YouTube or direct video link (mp4, webm, m3u8...)" aria-label="Video link">
          <button id="play-button" class="btn btn-play" aria-label="Play"><i class="fa fa-play"></i> Play</button>
        </div>

        <div class="action-row">
          <div class="left-actions">
            <button id="pip-button" class="btn btn-pill" title="Picture-in-Picture (P)"><i class="fa-solid fa-clone"></i> PiP</button>
            <button id="fullscreen-button" class="btn btn-pill" title="Fullscreen (F)"><i class="fa-solid fa-expand"></i> Fullscreen</button>
            <button id="download-button" class="btn btn-pill" title="Download (D)" style="display:none"><i class="fa-solid fa-download"></i> Download</button>
            <button id="reset-button" class="btn btn-pill" title="Reset (R)"><i class="fa-solid fa-rotate-right"></i> Reset</button>
          </div>

          <div class="right-actions">
            <button id="theme-toggle" class="btn btn-circle" title="Toggle Theme (T)"><i class="fa-solid fa-moon"></i></button>
          </div>
        </div>

        <!-- Custom video controls (visible for direct videos) -->
        <div id="direct-controls" class="video-controls" style="display:none;">
          <div class="progress-wrap" id="progress-container" aria-hidden="false">
            <div id="progress-bar" class="progress-bar"></div>
          </div>

          <div class="media-controls">
            <button id="play-pause-btn" class="small-btn" aria-label="Play/Pause">▶</button>
            <button id="rewind-btn" class="small-btn" title="Rewind 10s">⏪</button>
            <button id="forward-btn" class="small-btn" title="Forward 10s">⏩</button>

            <div class="volume-control">
              <button id="mute-btn" class="small-btn" title="Mute/Unmute">🔊</button>
              <input id="volume-slider" type="range" min="0" max="1" step="0.01" value="1" aria-label="Volume">
            </div>

            <div class="time-display">
              <span id="current-time">00:00</span> / <span id="duration">00:00</span>
            </div>

            <div class="quality-selector" id="quality-selector" style="display:none;">
              <select id="quality-select" aria-label="Quality">
                <option value="auto">Auto</option>
              </select>
            </div>
          </div>
        </div>

        <div id="messages">
          <div id="loading" class="msg" style="display:none">Loading video...</div>
          <div id="success-message" class="msg success" style="display:none"></div>
          <div id="error-message" class="msg error" style="display:none"></div>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div>Crafted with ❤️ by <a href="https://www.instagram.com/i.shubham0210/">Shubham</a></div>
  </footer>

  <script src="script.js" defer></script>
</body>
</html>

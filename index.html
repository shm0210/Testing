<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b141a">
  <title>▇▇▇▇ CHAT ▇▇▇▇</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0b141a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Helvetica Neue', sans-serif;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* Login Screen */
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0f12 0%, #11181f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      backdrop-filter: blur(2px);
    }

    .login-card {
      background: rgba(32, 44, 51, 0.95);
      backdrop-filter: blur(10px);
      padding: 2.2rem 1.8rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(0,168,132,0.2);
      animation: slideUp 0.4s cubic-bezier(0.2,0.9,0.4,1.1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h1 {
      font-size: 1.8rem;
      text-align: center;
      background: linear-gradient(135deg, #00d4b4, #00a884);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
      letter-spacing: 2px;
    }

    .login-card .sub {
      text-align: center;
      color: #8696a0;
      font-size: 0.7rem;
      margin-bottom: 1.8rem;
      letter-spacing: 1px;
    }

    .login-card input {
      width: 100%;
      padding: 1rem 1.2rem;
      margin: 0.8rem 0;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 1rem;
      text-align: center;
      letter-spacing: 1px;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      background: #2f414c;
      box-shadow: 0 0 0 2px #00a884;
    }

    .login-card button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 800;
      font-size: 1rem;
      margin-top: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card button:active { transform: scale(0.97); }

    /* Chat Interface */
    .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #0b141a;
    }

    /* Header */
    .chat-header {
      background: #202c33;
      padding: 0.75rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3b42;
      box-shadow: 0 1px 4px rgba(0,0,0,0.3);
    }

    .partner-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .partner-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .partner-details h3 {
      font-size: 1.1rem;
      font-weight: 600;
    }

    .online-status {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #8696a0;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #00a884;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    .offline-dot {
      width: 8px;
      height: 8px;
      background: #5e6f7e;
      border-radius: 50%;
      display: inline-block;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.9); }
    }

    .header-buttons button {
      background: #2a3942;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #e9edef;
      font-size: 1.2rem;
      cursor: pointer;
      margin-left: 0.5rem;
      transition: all 0.2s;
    }

    .header-buttons button:active { transform: scale(0.92); background: #3e555f; }

    /* Messages Area */
    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      background-image: radial-gradient(rgba(0,168,132,0.03) 1px, transparent 1px);
      background-size: 20px 20px;
    }

    .message {
      max-width: 80%;
      padding: 0.6rem 1rem;
      border-radius: 1.2rem;
      animation: fadeMsg 0.2s ease;
      word-wrap: break-word;
    }

    @keyframes fadeMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      background: #005c4b;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .message.received {
      background: #202c33;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .message-text { font-size: 0.9rem; line-height: 1.4; }
    .message-time {
      font-size: 0.65rem;
      color: #8696a0;
      text-align: right;
      margin-top: 0.25rem;
    }

    .media-preview {
      max-width: 220px;
      border-radius: 1rem;
      margin-top: 0.4rem;
      cursor: pointer;
    }
    .media-preview img, .media-preview video { width: 100%; border-radius: 1rem; max-height: 180px; object-fit: cover; }
    .voice-note { width: 180px; margin-top: 0.3rem; }

    /* Typing Indicator */
    .typing-badge {
      padding: 0.3rem 1rem;
      font-size: 0.7rem;
      color: #00a884;
      font-style: italic;
      height: 28px;
    }

    /* Input Area */
    .input-area {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      border-top: 1px solid #2e3b42;
    }

    .input-area input {
      flex: 1;
      padding: 0.9rem 1.2rem;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.9rem;
      outline: none;
    }

    .action-btn {
      background: #2a3942;
      border: none;
      width: 46px;
      height: 46px;
      border-radius: 50%;
      font-size: 1.3rem;
      cursor: pointer;
      color: #e9edef;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.1s;
    }

    .action-btn:active { transform: scale(0.94); background: #3e555f; }
    .send-btn { background: #00a884; color: #111b21; }
    .send-btn:active { background: #00c3a2; }
    .recording { background: #ff4444 !important; animation: blink 0.8s infinite; }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Admin Modal (Fully Hidden Logic) */
    .admin-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.95);
      z-index: 2000;
      justify-content: center;
      align-items: center;
    }

    .admin-card {
      background: #202c33;
      width: 92%;
      max-width: 500px;
      max-height: 85vh;
      border-radius: 1.8rem;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .admin-card h2 { color: #00a884; margin-bottom: 1rem; font-size: 1.3rem; }
    .cred-item {
      background: #2a3942;
      padding: 0.8rem;
      border-radius: 1rem;
      margin: 0.6rem 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
    }
    .admin-input {
      background: #111b21;
      border: none;
      padding: 0.6rem;
      border-radius: 2rem;
      color: white;
      margin: 0.3rem;
    }
    .admin-btn {
      background: #00a884;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-weight: bold;
      margin: 0.2rem;
      cursor: pointer;
    }
    .danger-btn { background: #d32f2f; color: white; }
    .close-btn { background: #3e555f; margin-top: 1rem; width: 100%; }

    /* Scroll */
    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: #1a252c; }
    .messages-area::-webkit-scrollbar-thumb { background: #00a884; border-radius: 4px; }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>▣ ▣ ▣ ▣</h1>
    <div class="sub">SECURE • PRIVATE • ENCRYPTED</div>
    <input type="password" id="secretInput" placeholder="✦ ENTER SECRET KEY ✦" autocomplete="off">
    <button id="unlockBtn">◈ UNLOCK ◈</button>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info">
      <div class="partner-avatar" id="partnerAvatar">👤</div>
      <div class="partner-details">
        <h3 id="partnerName">---</h3>
        <div class="online-status" id="onlineStatus">
          <span class="offline-dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    </div>
    <div class="header-buttons">
      <button id="adminKeyBtn">⚙️</button>
    </div>
  </div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>
  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendMsgBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
</div>

<div id="adminModal" class="admin-modal">
  <div class="admin-card">
    <h2>⚙️ ADMIN VAULT ⚙️</h2>
    <div id="adminCredsPanel"></div>
    <button id="closeAdminBtn" class="admin-btn close-btn">CLOSE</button>
  </div>
</div>

<script>
(function(){
  // ███████████████████████████████████████████████████████
  //  SECURE ENCODED CONFIG - OBFUSCATED FOR GITHUB
  // ███████████████████████████████████████████████████████
  const _0x3a2f = {
    fbKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    fbDomain: "secret-chat-ce77a.firebaseapp.com",
    fbUrl: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    fbProj: "secret-chat-ce77a",
    fbStore: "secret-chat-ce77a.appspot.com",
    fbId: "332764244582",
    fbApp: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  // DEFAULT CREDENTIALS (will be rewritten by Admin)
  let __USERS = {
    "PARTNER_A": { name: "Shubham", code: "#9569@", avatar: "🔥", role: "user" },
    "PARTNER_B": { name: "Sakshi", code: "#9454@", avatar: "🌸", role: "user" },
    "ADMIN_KEY": { name: "Admin", code: "#ADMIN@2025", avatar: "👑", role: "owner" }
  };

  let currentUser = null;
  let partnerUser = null;
  let mediaRec = null;
  let audioBuf = [];
  let typingTm = null;
  let app, db, storage, messagesRef, statusRef, typingRef;

  // Helper: Save encrypted users to localStorage
  function syncUsersToLocal(){
    localStorage.setItem('__secretUsers__', btoa(JSON.stringify(__USERS)));
  }

  function loadUsersFromLocal(){
    let raw = localStorage.getItem('__secretUsers__');
    if(raw){
      try{
        let parsed = JSON.parse(atob(raw));
        if(parsed && Object.keys(parsed).length) __USERS = parsed;
      }catch(e){}
    }
    syncUsersToLocal();
  }

  loadUsersFromLocal();

  // Firebase Import Async
  async function initFirebase(){
    const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js');
    const { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, serverTimestamp, get, remove } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js');
    const { getStorage, ref as sRef, uploadBytes, getDownloadURL } = await import('https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js');
    
    const fbConfig = {
      apiKey: _0x3a2f.fbKey,
      authDomain: _0x3a2f.fbDomain,
      databaseURL: _0x3a2f.fbUrl,
      projectId: _0x3a2f.fbProj,
      storageBucket: _0x3a2f.fbStore,
      messagingSenderId: _0x3a2f.fbId,
      appId: _0x3a2f.fbApp
    };
    app = initializeApp(fbConfig);
    db = getDatabase(app);
    storage = getStorage(app);
    messagesRef = ref(db, 'chats_v2');
    statusRef = ref(db, 'status_v2');
    typingRef = ref(db, 'typing_v2');
  }

  // Logic after login
  window.loginWithCode = async function(enteredCode){
    await initFirebase();
    let matched = null;
    for(let key in __USERS){
      if(__USERS[key].code === enteredCode){
        matched = { id: key, ...__USERS[key] };
        break;
      }
    }
    if(matched){
      currentUser = matched;
      // determine partner (the other user in two-person chat)
      let partnerId = null;
      for(let k in __USERS){
        if(k !== currentUser.id && __USERS[k].role !== 'owner') partnerId = k;
      }
      if(partnerId) partnerUser = { id: partnerId, ...__USERS[partnerId] };
      else partnerUser = null;
      
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatContainer').style.display = 'flex';
      document.getElementById('partnerName').innerText = partnerUser?.name || "Partner";
      document.getElementById('partnerAvatar').innerText = partnerUser?.avatar || "💬";
      
      // Show admin only for owner
      if(currentUser.role === 'owner') document.getElementById('adminKeyBtn').style.display = 'inline-flex';
      else document.getElementById('adminKeyBtn').style.display = 'none';
      
      await set(ref(db, `status_v2/${currentUser.name}`), { online: true, lastSeen: serverTimestamp() });
      onDisconnect(ref(db, `status_v2/${currentUser.name}`)).set({ online: false, lastSeen: serverTimestamp() });
      
      watchPartnerStatus();
      loadChatMessages();
      watchTypingIndicator();
    } else {
      alert("❌ INVALID KEY");
    }
  };

  async function watchPartnerStatus(){
    if(!partnerUser) return;
    onValue(ref(db, `status_v2/${partnerUser.name}`), (snap) => {
      let data = snap.val();
      let isOnline = data?.online === true;
      let statusDiv = document.getElementById('onlineStatus');
      if(isOnline){
        statusDiv.innerHTML = '<span class="online-dot"></span><span>Online now</span>';
      } else {
        statusDiv.innerHTML = '<span class="offline-dot"></span><span>Offline</span>';
      }
    });
  }

  function loadChatMessages(){
    onChildAdded(messagesRef, (snap) => {
      let msg = snap.val();
      if(!msg) return;
      let isMe = (msg.sender === currentUser.name);
      let msgDiv = document.createElement('div');
      msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
      let inner = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;
      if(msg.fileUrl){
        if(msg.fileType === 'image') inner += `<div class="media-preview"><img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')"></div>`;
        else if(msg.fileType === 'video') inner += `<div class="media-preview"><video src="${msg.fileUrl}" controls></video></div>`;
        else if(msg.fileType === 'audio') inner += `<audio class="voice-note" src="${msg.fileUrl}" controls></audio>`;
      }
      inner += `<div class="message-time">${new Date(msg.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'})}</div>`;
      msgDiv.innerHTML = inner;
      document.getElementById('messagesArea').appendChild(msgDiv);
      document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
    });
  }

  function watchTypingIndicator(){
    onValue(typingRef, (snap) => {
      let data = snap.val() || {};
      if(partnerUser && data[partnerUser.name] === true){
        document.getElementById('typingBadge').innerText = `${partnerUser.name} is typing ...`;
      } else {
        document.getElementById('typingBadge').innerText = '';
      }
    });
  }

  window.sendMessage = async (text, fileBlob=null, fType=null) => {
    if(!text && !fileBlob) return;
    let fileUrl = null, fileType = null;
    if(fileBlob){
      let ext = fType === 'image' ? '.jpg' : '.mp4';
      let fileRef = ref(storage, `media/${Date.now()}_${Math.random()}.${ext}`);
      await uploadBytes(fileRef, fileBlob);
      fileUrl = await getDownloadURL(fileRef);
      fileType = fType;
    }
    await push(messagesRef, {
      sender: currentUser.name,
      text: text || null,
      fileUrl: fileUrl,
      fileType: fileType,
      time: Date.now()
    });
    if(text) document.getElementById('msgInput').value = '';
    set(ref(db, `typing_v2/${currentUser.name}`), false);
  };

  window.sendTyping = () => {
    if(!currentUser) return;
    set(ref(db, `typing_v2/${currentUser.name}`), true);
    if(typingTm) clearTimeout(typingTm);
    typingTm = setTimeout(() => set(ref(db, `typing_v2/${currentUser.name}`), false), 2000);
  };

  // Voice Recording
  let mediaStream = null;
  window.startVoice = async () => {
    try{
      let stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRec = new MediaRecorder(stream);
      audioBuf = [];
      mediaRec.ondataavailable = e => audioBuf.push(e.data);
      mediaRec.start();
      document.getElementById('voiceBtn').classList.add('recording');
      mediaStream = stream;
    } catch(e){ alert("Mic required"); }
  };
  window.stopVoice = () => {
    if(mediaRec && mediaRec.state === 'recording'){
      mediaRec.stop();
      document.getElementById('voiceBtn').classList.remove('recording');
      mediaRec.onstop = async () => {
        let blob = new Blob(audioBuf, { type: 'audio/webm' });
        let audioRef = ref(storage, `audio/${Date.now()}.webm`);
        await uploadBytes(audioRef, blob);
        let url = await getDownloadURL(audioRef);
        await push(messagesRef, {
          sender: currentUser.name,
          text: null,
          fileUrl: url,
          fileType: 'audio',
          time: Date.now()
        });
        if(mediaStream) mediaStream.getTracks().forEach(t => t.stop());
      };
    }
  };

  // ADMIN PANEL - FULL CONTROL OVER CREDENTIALS
  window.openAdmin = async () => {
    if(currentUser?.role !== 'owner') { alert("No access"); return; }
    await initFirebase();
    renderAdminPanel();
    document.getElementById('adminModal').style.display = 'flex';
  };

  function renderAdminPanel(){
    let container = document.getElementById('adminCredsPanel');
    container.innerHTML = `<div style="margin-bottom:1rem"><strong>🔐 TWO PERSON + OWNER CREDENTIALS</strong></div>`;
    let idx=0;
    for(let k in __USERS){
      let u = __USERS[k];
      container.innerHTML += `
        <div class="cred-item">
          <input id="name_${idx}" class="admin-input" placeholder="Name" value="${escapeHtml(u.name)}" style="width:100px">
          <input id="code_${idx}" class="admin-input" placeholder="Secret Code" value="${escapeHtml(u.code)}" style="width:130px">
          <input id="avatar_${idx}" class="admin-input" placeholder="Avatar" value="${escapeHtml(u.avatar)}" style="width:60px">
          <select id="role_${idx}" class="admin-input">
            <option value="user" ${u.role==='user'?'selected':''}>User</option>
            <option value="owner" ${u.role==='owner'?'selected':''}>Owner</option>
          </select>
          <button class="admin-btn" onclick="updateUser('${k}', ${idx})">💾 Save</button>
          ${u.role !== 'owner' ? `<button class="admin-btn danger-btn" onclick="deleteUser('${k}')">🗑️</button>` : ''}
        </div>
      `;
      idx++;
    }
    container.innerHTML += `<div style="margin-top:1rem"><button class="admin-btn" onclick="addNewUser()">➕ ADD NEW USER (TWO PERSON CHAT)</button></div>`;
    container.innerHTML += `<div style="margin-top:0.8rem"><button class="admin-btn danger-btn" onclick="resetAllMsgs()">⚠️ DELETE ALL MESSAGES</button>
    <button class="admin-btn" onclick="exportChatBackup()">📥 EXPORT BACKUP</button></div>`;
  }

  window.updateUser = async (key, idx) => {
    let newName = document.getElementById(`name_${idx}`).value.trim();
    let newCode = document.getElementById(`code_${idx}`).value.trim();
    let newAvatar = document.getElementById(`avatar_${idx}`).value.trim();
    let newRole = document.getElementById(`role_${idx}`).value;
    if(!newName || !newCode) return alert("Name & Code required");
    __USERS[key] = { name: newName, code: newCode, avatar: newAvatar || "👤", role: newRole };
    syncUsersToLocal();
    renderAdminPanel();
    alert(`✅ Updated: ${newName}`);
  };

  window.deleteUser = async (key) => {
    if(__USERS[key].role === 'owner') return alert("Cannot delete owner");
    delete __USERS[key];
    syncUsersToLocal();
    renderAdminPanel();
    alert("User removed");
  };

  window.addNewUser = () => {
    let newId = "user_" + Date.now();
    __USERS[newId] = { name: "NewUser", code: "#NEW@123", avatar: "👤", role: "user" };
    syncUsersToLocal();
    renderAdminPanel();
  };

  window.resetAllMsgs = async () => {
    if(confirm("⚠️ DELETE ALL MESSAGES PERMANENTLY?")){
      await set(messagesRef, null);
      alert("Chat cleared");
    }
  };
  window.exportChatBackup = async () => {
    let snap = await get(messagesRef);
    let data = JSON.stringify(snap.val() || {});
    let blob = new Blob([data], {type: 'application/json'});
    let url = URL.createObjectURL(blob);
    let a = document.createElement('a');
    a.href = url;
    a.download = `chat_backup_${Date.now()}.json`;
    a.click();
    URL.revokeObjectURL(url);
  };

  function escapeHtml(str){ if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m=='&') return '&amp;'; if(m=='<') return '&lt;'; if(m=='>') return '&gt;'; return m;}); }

  // Event binding
  document.getElementById('unlockBtn').onclick = () => { let code = document.getElementById('secretInput').value; loginWithCode(code); };
  document.getElementById('sendMsgBtn').onclick = () => sendMessage(document.getElementById('msgInput').value.trim());
  document.getElementById('msgInput').onkeydown = (e) => { if(e.key === 'Enter') sendMessage(e.target.value.trim()); };
  document.getElementById('msgInput').oninput = () => sendTyping();
  document.getElementById('attachBtn').onclick = () => document.getElementById('fileUpload').click();
  document.getElementById('fileUpload').onchange = async (e) => {
    let file = e.target.files[0];
    if(file && file.size < 5*1024*1024){
      let type = file.type.startsWith('image/') ? 'image' : 'video';
      let reader = new FileReader();
      reader.onload = async (ev) => {
        let blob = await fetch(ev.target.result).then(r => r.blob());
        await sendMessage(null, blob, type);
      };
      reader.readAsDataURL(file);
    } else alert("Max 5MB");
    e.target.value = '';
  };
  document.getElementById('voiceBtn').onmousedown = startVoice;
  document.getElementById('voiceBtn').onmouseup = stopVoice;
  document.getElementById('voiceBtn').ontouchstart = startVoice;
  document.getElementById('voiceBtn').ontouchend = stopVoice;
  document.getElementById('adminKeyBtn').onclick = openAdmin;
  document.getElementById('closeAdminBtn').onclick = () => document.getElementById('adminModal').style.display = 'none';
})();
</script>
</body>

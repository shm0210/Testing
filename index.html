<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="theme-color" content="#0b141a">
  <title>✦ SECURE CHAT ✦ | Instant Messaging</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0b141a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
      color: #e9edef;
    }

    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0f12 0%, #11181f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .login-card {
      background: #202c33;
      padding: 2rem 1.5rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 340px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(0,168,132,0.3);
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h1 {
      font-size: 1.8rem;
      text-align: center;
      background: linear-gradient(135deg, #00d4b4, #00a884);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-card .sub {
      text-align: center;
      color: #8696a0;
      font-size: 0.7rem;
      margin-bottom: 1.5rem;
    }

    .login-card input {
      width: 100%;
      padding: 1rem;
      margin: 0.6rem 0;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 1rem;
      text-align: center;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      background: #2f414c;
      box-shadow: 0 0 0 2px #00a884;
    }

    .login-card button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 800;
      font-size: 1rem;
      margin-top: 0.8rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card button:active { transform: scale(0.97); }
    .error-msg {
      color: #ff6b6b;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.8rem;
      min-height: 1rem;
    }
    .success-msg {
      color: #00a884;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.5rem;
    }

    .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #0b141a;
      position: relative;
    }

    .chat-header {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3b42;
      flex-shrink: 0;
    }

    .partner-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .partner-avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      color: #111b21;
      font-weight: bold;
    }

    .partner-details h3 {
      font-size: 1rem;
      font-weight: 600;
    }

    .online-status {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #8696a0;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #00a884;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .offline-dot {
      width: 8px;
      height: 8px;
      background: #5e6f7e;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-btns button {
      background: #2a3942;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #e9edef;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
      -webkit-overflow-scrolling: touch;
    }

    .message {
      max-width: 80%;
      padding: 0.6rem 0.9rem;
      border-radius: 1.2rem;
      animation: fadeMsg 0.2s ease;
      word-wrap: break-word;
    }

    @keyframes fadeMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      background: #005c4b;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .message.received {
      background: #202c33;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .message-text {
      font-size: 0.9rem;
      line-height: 1.4;
      word-break: break-word;
    }

    .message-time {
      font-size: 0.6rem;
      color: #8696a0;
      text-align: right;
      margin-top: 0.2rem;
    }

    .media-preview {
      max-width: 200px;
      border-radius: 0.8rem;
      margin-top: 0.3rem;
      cursor: pointer;
    }
    .media-preview img, .media-preview video {
      width: 100%;
      border-radius: 0.8rem;
      max-height: 150px;
      object-fit: cover;
    }
    .voice-note {
      width: 160px;
      margin-top: 0.3rem;
    }

    .typing-badge {
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      color: #00a884;
      font-style: italic;
      height: 28px;
      background: #0b141a;
      flex-shrink: 0;
    }

    .input-area {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      border-top: 1px solid #2e3b42;
      flex-shrink: 0;
    }

    .input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.9rem;
      outline: none;
      min-width: 0;
    }

    .action-btn {
      background: #2a3942;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #e9edef;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.1s ease;
    }

    .action-btn:active { transform: scale(0.95); }
    .send-btn { background: #00a884; color: #111b21; }
    .recording { background: #ff4444 !important; animation: blink 0.8s infinite; }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .messages-area::-webkit-scrollbar {
      width: 4px;
    }
    .messages-area::-webkit-scrollbar-track {
      background: #1a252c;
    }
    .messages-area::-webkit-scrollbar-thumb {
      background: #00a884;
      border-radius: 4px;
    }

    .info-banner {
      background: #00a88420;
      color: #00a884;
      padding: 6px 12px;
      font-size: 0.7rem;
      text-align: center;
      border-bottom: 1px solid #00a88430;
    }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✦ SECURE CHAT ✦</h1>
    <div class="sub">PRIVATE • ENCRYPTED • REAL-TIME</div>
    <input type="email" id="emailInput" placeholder="Email" autocomplete="off" spellcheck="false">
    <input type="password" id="passwordInput" placeholder="Password" autocomplete="off">
    <button id="loginBtn">✦ LOGIN ✦</button>
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg"></div>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info">
      <div class="partner-avatar" id="partnerAvatar">👤</div>
      <div class="partner-details">
        <h3 id="partnerName">Loading...</h3>
        <div class="online-status" id="onlineStatus">
          <span class="offline-dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    </div>
    <div class="header-btns">
      <button id="logoutBtn">🚪</button>
    </div>
  </div>
  <div class="info-banner" id="infoBanner">💬 Start chatting! Messages will be delivered when partner is online.</div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>

  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, query, orderByChild, limitToLast } from 'firebase/database';
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'firebase/storage';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);

  // User mappings - email to display info
  const USER_PROFILES = {
    "sp@sv.com": { name: "Shubham", avatar: "😎", shortName: "SP" },
    "sv@sp.com": { name: "Sakshi", avatar: "🌸", shortName: "SV" }
  };

  const messagesRef = ref(db, 'chat_messages');
  const usersRef = ref(db, 'active_users');
  
  let currentUser = null;
  let partnerInfo = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let typingTimeout = null;
  let isRecording = false;

  // Get partner email based on current user
  function getPartnerEmail(currentEmail) {
    if (currentEmail === "sp@sv.com") return "sv@sp.com";
    if (currentEmail === "sv@sp.com") return "sp@sv.com";
    return null;
  }

  async function loginOrCreate(email, password) {
    const errorMsgDiv = document.getElementById('errorMsg');
    const successMsgDiv = document.getElementById('successMsg');
    
    errorMsgDiv.innerText = '';
    successMsgDiv.innerText = '';
    
    const trimmedEmail = email.trim().toLowerCase();
    if (!trimmedEmail || !password) {
      errorMsgDiv.innerText = '❌ Please enter email and password';
      return false;
    }
    
    if (!USER_PROFILES[trimmedEmail]) {
      errorMsgDiv.innerText = '❌ Unauthorized. Use sp@sv.com or sv@sp.com';
      return false;
    }
    
    try {
      try {
        await signInWithEmailAndPassword(auth, trimmedEmail, password);
        successMsgDiv.innerText = '✓ Login successful!';
        setTimeout(() => successMsgDiv.innerText = '', 1500);
        return true;
      } catch (signInError) {
        if (signInError.code === 'auth/invalid-credential' || signInError.code === 'auth/user-not-found') {
          successMsgDiv.innerText = '🔄 Creating account...';
          await createUserWithEmailAndPassword(auth, trimmedEmail, password);
          successMsgDiv.innerText = '✓ Account created! Logging in...';
          await signInWithEmailAndPassword(auth, trimmedEmail, password);
          successMsgDiv.innerText = '✓ Login successful!';
          setTimeout(() => successMsgDiv.innerText = '', 1500);
          return true;
        } else {
          throw signInError;
        }
      }
    } catch (error) {
      console.error("Auth error:", error);
      if (error.code === 'auth/wrong-password') {
        errorMsgDiv.innerText = '❌ Wrong password.';
      } else if (error.code === 'auth/weak-password') {
        errorMsgDiv.innerText = '❌ Password must be at least 6 characters.';
      } else if (error.code === 'auth/invalid-email') {
        errorMsgDiv.innerText = '❌ Invalid email format.';
      } else {
        errorMsgDiv.innerText = `❌ Login failed: ${error.message}`;
      }
      return false;
    }
  }

  async function setupChat(user) {
    const userEmail = user.email;
    const profile = USER_PROFILES[userEmail];
    
    if (!profile) {
      await signOut(auth);
      return;
    }

    currentUser = {
      uid: user.uid,
      email: userEmail,
      name: profile.name,
      avatar: profile.avatar
    };

    const partnerEmail = getPartnerEmail(userEmail);
    partnerInfo = {
      email: partnerEmail,
      name: USER_PROFILES[partnerEmail].name,
      avatar: USER_PROFILES[partnerEmail].avatar
    };

    // Update UI with partner info immediately
    document.getElementById('partnerName').innerHTML = partnerInfo.name;
    document.getElementById('partnerAvatar').innerText = partnerInfo.avatar;

    // Register current user online status
    await set(ref(db, `status/${currentUser.uid}`), {
      email: currentUser.email,
      name: currentUser.name,
      online: true,
      lastSeen: Date.now()
    });
    
    onDisconnect(ref(db, `status/${currentUser.uid}`)).set({
      email: currentUser.email,
      name: currentUser.name,
      online: false,
      lastSeen: Date.now()
    });

    // Listen to partner's online status using their email as identifier (more reliable)
    const findPartnerStatus = () => {
      onValue(ref(db, 'status'), (snapshot) => {
        const statuses = snapshot.val();
        let partnerOnline = false;
        if (statuses) {
          for (let [uid, data] of Object.entries(statuses)) {
            if (data.email === partnerInfo.email && data.online === true) {
              partnerOnline = true;
              break;
            }
          }
        }
        const statusDiv = document.getElementById('onlineStatus');
        if (partnerOnline) {
          statusDiv.innerHTML = '<span class="online-dot"></span><span>Online now</span>';
          document.getElementById('infoBanner').style.display = 'none';
        } else {
          statusDiv.innerHTML = '<span class="offline-dot"></span><span>Offline</span>';
          document.getElementById('infoBanner').style.display = 'block';
        }
      });
    };
    findPartnerStatus();

    // Listen to partner's typing status
    onValue(ref(db, `typing/${partnerInfo.email}`), (snapshot) => {
      const isTyping = snapshot.val();
      if (isTyping) {
        document.getElementById('typingBadge').innerHTML = `${partnerInfo.name} is typing...`;
      } else {
        document.getElementById('typingBadge').innerHTML = '';
      }
    });

    // Load all messages (both sent and received)
    loadMessages();
  }

  function loadMessages() {
    // Load recent messages and listen for new ones
    const recentMessagesQuery = query(messagesRef, orderByChild('timestamp'), limitToLast(100));
    
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      if (!msg || !currentUser) return;
      
      // Show messages between these two users (regardless of order)
      const isRelevant = (msg.senderEmail === currentUser.email && msg.receiverEmail === partnerInfo.email) ||
                         (msg.senderEmail === partnerInfo.email && msg.receiverEmail === currentUser.email);
      
      if (isRelevant) {
        displayMessage(msg);
      }
    });
  }

  function displayMessage(msg) {
    const isMe = (msg.senderEmail === currentUser.email);
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
    
    let content = '';
    if (msg.text) {
      content += `<div class="message-text">${escapeHtml(msg.text)}</div>`;
    }
    
    if (msg.fileUrl) {
      if (msg.fileType === 'image') {
        content += `<div class="media-preview"><img src="${msg.fileUrl}" alt="image" onclick="window.open('${msg.fileUrl}')"></div>`;
      } else if (msg.fileType === 'video') {
        content += `<div class="media-preview"><video src="${msg.fileUrl}" controls preload="metadata"></video></div>`;
      } else if (msg.fileType === 'audio') {
        content += `<audio class="voice-note" src="${msg.fileUrl}" controls preload="metadata"></audio>`;
      }
    }
    
    const timeStr = new Date(msg.timestamp).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    content += `<div class="message-time">${timeStr}</div>`;
    msgDiv.innerHTML = content;
    
    const container = document.getElementById('messagesArea');
    container.appendChild(msgDiv);
    scrollToBottom();
  }

  async function sendMessage(text, fileBlob = null, fileType = null) {
    if (!currentUser) return;
    if (!text && !fileBlob) return;
    
    let fileUrl = null;
    let finalType = fileType;
    
    if (fileBlob) {
      const ext = fileType === 'image' ? 'jpg' : (fileType === 'audio' ? 'webm' : 'mp4');
      const fileName = `media_${Date.now()}_${Math.random().toString(36).substring(2, 8)}.${ext}`;
      const fileRef = sRef(storage, `chat_files/${fileName}`);
      await uploadBytes(fileRef, fileBlob);
      fileUrl = await getDownloadURL(fileRef);
    }
    
    const messageData = {
      senderName: currentUser.name,
      senderEmail: currentUser.email,
      receiverEmail: partnerInfo.email,
      text: text || null,
      fileUrl: fileUrl,
      fileType: finalType,
      timestamp: Date.now()
    };
    
    await push(messagesRef, messageData);
    
    if (text) {
      document.getElementById('msgInput').value = '';
    }
    
    // Clear typing indicator
    await set(ref(db, `typing/${currentUser.email}`), false);
  }

  async function sendTyping() {
    if (!currentUser) return;
    await set(ref(db, `typing/${currentUser.email}`), true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(async () => {
      await set(ref(db, `typing/${currentUser.email}`), false);
    }, 2000);
  }

  async function startRecording() {
    if (isRecording) return;
    
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => {
        if (e.data.size > 0) audioChunks.push(e.data);
      };
      
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        if (audioBlob.size > 0 && currentUser) {
          await sendMessage(null, audioBlob, 'audio');
        }
        stream.getTracks().forEach(track => track.stop());
        const voiceBtn = document.getElementById('voiceBtn');
        if (voiceBtn) voiceBtn.classList.remove('recording');
        isRecording = false;
      };
      
      mediaRecorder.start();
      document.getElementById('voiceBtn').classList.add('recording');
      isRecording = true;
      
      // Auto-stop after 30 seconds
      setTimeout(() => {
        if (isRecording && mediaRecorder && mediaRecorder.state === 'recording') {
          stopRecording();
        }
      }, 30000);
      
    } catch (err) {
      console.error(err);
      alert("Microphone access required for voice notes.");
    }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    } else {
      if (document.getElementById('voiceBtn').classList.contains('recording')) {
        document.getElementById('voiceBtn').classList.remove('recording');
      }
      isRecording = false;
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, (m) => {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  function scrollToBottom() {
    const msgArea = document.getElementById('messagesArea');
    if (msgArea) msgArea.scrollTop = msgArea.scrollHeight;
  }

  // Auth state observer
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatContainer').style.display = 'flex';
      await setupChat(user);
    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('chatContainer').style.display = 'none';
      currentUser = null;
      partnerInfo = null;
      document.getElementById('messagesArea').innerHTML = '';
      document.getElementById('typingBadge').innerHTML = '';
      document.getElementById('emailInput').value = '';
      document.getElementById('passwordInput').value = '';
    }
  });

  // Event listeners
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('emailInput').value.trim().toLowerCase();
    const password = document.getElementById('passwordInput').value;
    await loginOrCreate(email, password);
  };
  
  document.getElementById('passwordInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      document.getElementById('loginBtn').click();
    }
  };
  
  document.getElementById('logoutBtn').onclick = async () => {
    if (currentUser) {
      await set(ref(db, `status/${currentUser.uid}`), { online: false, lastSeen: Date.now() });
      await set(ref(db, `typing/${currentUser.email}`), false);
    }
    await signOut(auth);
  };
  
  document.getElementById('sendBtn').onclick = () => {
    const text = document.getElementById('msgInput').value.trim();
    if (text) sendMessage(text);
  };
  
  document.getElementById('msgInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const text = e.target.value.trim();
      if (text) sendMessage(text);
    }
  };
  
  document.getElementById('msgInput').oninput = () => sendTyping();
  
  document.getElementById('attachBtn').onclick = () => {
    document.getElementById('fileUpload').click();
  };
  
  document.getElementById('fileUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (file && currentUser) {
      if (file.size > 5 * 1024 * 1024) {
        alert("File too large (max 5MB)");
        e.target.value = '';
        return;
      }
      const type = file.type.startsWith('image/') ? 'image' : 'video';
      await sendMessage(null, file, type);
    }
    e.target.value = '';
  };
  
  const voiceBtn = document.getElementById('voiceBtn');
  voiceBtn.addEventListener('pointerdown', (e) => {
    e.preventDefault();
    if (!isRecording && currentUser) startRecording();
  });
  voiceBtn.addEventListener('pointerup', (e) => {
    e.preventDefault();
    if (isRecording) stopRecording();
  });
  voiceBtn.addEventListener('pointercancel', (e) => {
    if (isRecording) stopRecording();
  });
  
  const observer = new MutationObserver(() => scrollToBottom());
  observer.observe(document.getElementById('messagesArea'), { childList: true, subtree: true });
  
  console.log("✅ Secure Chat Ready!");
  console.log("📧 Allowed emails: sp@sv.com (Shubham) and sv@sp.com (Sakshi)");
  console.log("💬 You can start chatting immediately - messages are stored and delivered when partner comes online!");
</script>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>◈ REAL-TIME CHAT ◈</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0b141a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0f12 0%, #11181f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      overflow-y: auto;
    }

    .login-card {
      background: #202c33;
      padding: 2.5rem 1.8rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 360px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(0,168,132,0.3);
      animation: fadeInUp 0.4s ease;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .login-card h1 {
      font-size: 2rem;
      text-align: center;
      background: linear-gradient(135deg, #00d4b4, #00a884);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-card .sub {
      text-align: center;
      color: #8696a0;
      font-size: 0.7rem;
      margin-bottom: 1.8rem;
    }

    .login-card input {
      width: 100%;
      padding: 1rem 1.2rem;
      margin: 0.8rem 0;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      background: #2f414c;
      box-shadow: 0 0 0 2px #00a884;
    }

    .login-card button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 800;
      font-size: 1rem;
      margin-top: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card button:active { transform: scale(0.97); }
    
    .switch-mode {
      text-align: center;
      margin-top: 1.5rem;
      color: #8696a0;
      font-size: 0.8rem;
    }
    
    .switch-mode a {
      color: #00a884;
      text-decoration: none;
      cursor: pointer;
    }
    
    .error-msg {
      background: #d32f2f;
      color: white;
      padding: 0.5rem;
      border-radius: 0.5rem;
      font-size: 0.8rem;
      margin: 0.5rem 0;
      text-align: center;
    }

    .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #0b141a;
    }

    .chat-header {
      background: #202c33;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3b42;
    }

    .partner-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
    }

    .partner-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
    }

    .partner-details h3 {
      font-size: 1rem;
      font-weight: 600;
    }

    .online-status {
      display: flex;
      align-items: center;
      gap: 0.3rem;
      font-size: 0.7rem;
      color: #8696a0;
    }

    .online-dot {
      width: 8px;
      height: 8px;
      background: #00a884;
      border-radius: 50%;
      animation: pulse 1.5s infinite;
    }

    .offline-dot {
      width: 8px;
      height: 8px;
      background: #5e6f7e;
      border-radius: 50%;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .header-btns button {
      background: #2a3942;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #e9edef;
      font-size: 1.2rem;
      cursor: pointer;
    }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .message {
      max-width: 75%;
      padding: 0.6rem 1rem;
      border-radius: 1.2rem;
      animation: fadeMsg 0.2s ease;
      word-wrap: break-word;
    }

    @keyframes fadeMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      background: #005c4b;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .message.received {
      background: #202c33;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .message-text { font-size: 0.9rem; line-height: 1.4; }
    .message-time {
      font-size: 0.6rem;
      color: #8696a0;
      text-align: right;
      margin-top: 0.2rem;
    }

    .media-preview {
      max-width: 200px;
      border-radius: 0.8rem;
      margin-top: 0.3rem;
      cursor: pointer;
    }
    .media-preview img, .media-preview video { width: 100%; border-radius: 0.8rem; max-height: 150px; object-fit: cover; }
    .voice-note { width: 160px; margin-top: 0.3rem; }

    .typing-badge {
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      color: #00a884;
      font-style: italic;
      height: 28px;
    }

    .input-area {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      border-top: 1px solid #2e3b42;
    }

    .input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.9rem;
      outline: none;
    }

    .action-btn {
      background: #2a3942;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #e9edef;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:active { transform: scale(0.95); }
    .send-btn { background: #00a884; color: #111b21; }
    .recording { background: #ff4444 !important; animation: blink 0.8s infinite; }
    .logout-btn { background: #d32f2f; }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: #1a252c; }
    .messages-area::-webkit-scrollbar-thumb { background: #00a884; border-radius: 4px; }
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✦ REAL-TIME CHAT ✦</h1>
    <div class="sub">AUTHENTICATED • SECURE • PRIVATE</div>
    
    <div id="authError" style="display:none;" class="error-msg"></div>
    
    <div id="loginForm">
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn">✦ LOGIN ✦</button>
      <div class="switch-mode">
        Don't have an account? <a id="showSignup">Create Account</a>
      </div>
    </div>
    
    <div id="signupForm" style="display:none;">
      <input type="text" id="signupName" placeholder="Full Name">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
      <input type="text" id="signupAvatar" placeholder="Avatar Emoji (optional)" maxlength="2" value="👤">
      <button id="signupBtn">✦ REGISTER ✦</button>
      <div class="switch-mode">
        Already have an account? <a id="showLogin">Back to Login</a>
      </div>
    </div>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info">
      <div class="partner-avatar" id="partnerAvatar">👤</div>
      <div class="partner-details">
        <h3 id="partnerName">Loading...</h3>
        <div class="online-status" id="onlineStatus">
          <span class="offline-dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    </div>
    <div class="header-btns">
      <button id="adminBtn" style="display:none;">⚙️</button>
      <button id="logoutBtn" class="logout-btn">🚪</button>
    </div>
  </div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>
  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, serverTimestamp, get, query, orderByChild, limitToLast } from 'firebase/database';
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'firebase/storage';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut, onAuthStateChanged } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);
  
  const messagesRef = ref(db, 'chat_messages');
  const usersRef = ref(db, 'app_users');
  
  let currentUser = null;
  let currentUserData = null;
  let partnerUser = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let typingTimeout = null;

  function showError(msg) {
    const errorDiv = document.getElementById('authError');
    errorDiv.textContent = msg;
    errorDiv.style.display = 'block';
    setTimeout(() => errorDiv.style.display = 'none', 4000);
  }

  // Toggle between login/signup
  document.getElementById('showSignup').onclick = () => {
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  };
  
  document.getElementById('showLogin').onclick = () => {
    document.getElementById('signupForm').style.display = 'none';
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('authError').style.display = 'none';
  };

  // Login with email/password
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    
    if (!email || !password) {
      showError("Please enter email and password");
      return;
    }
    
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      console.log("Logged in:", userCredential.user.email);
    } catch (error) {
      console.error(error);
      if (error.code === 'auth/user-not-found') {
        showError("No account found with this email");
      } else if (error.code === 'auth/wrong-password') {
        showError("Incorrect password");
      } else if (error.code === 'auth/invalid-email') {
        showError("Invalid email format");
      } else {
        showError("Login failed: " + error.message);
      }
    }
  };

  // Signup with email/password
  document.getElementById('signupBtn').onclick = async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const avatar = document.getElementById('signupAvatar').value.trim() || "👤";
    
    if (!name || !email || !password) {
      showError("Please fill all fields");
      return;
    }
    
    if (password.length < 6) {
      showError("Password must be at least 6 characters");
      return;
    }
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      
      // Save user data to Realtime Database
      const userData = {
        uid: userCredential.user.uid,
        name: name,
        email: email,
        avatar: avatar,
        role: "user",
        createdAt: Date.now()
      };
      
      await set(ref(db, `app_users/${userCredential.user.uid}`), userData);
      console.log("User registered and saved");
      
    } catch (error) {
      console.error(error);
      if (error.code === 'auth/email-already-in-use') {
        showError("Email already registered");
      } else if (error.code === 'auth/invalid-email') {
        showError("Invalid email format");
      } else if (error.code === 'auth/weak-password') {
        showError("Password too weak");
      } else {
        showError("Signup failed: " + error.message);
      }
    }
  };

  // Logout function
  document.getElementById('logoutBtn').onclick = async () => {
    try {
      if (currentUserData) {
        await set(ref(db, `user_status/${currentUserData.uid}`), { online: false, lastSeen: Date.now() });
      }
      await signOut(auth);
      window.location.reload();
    } catch (error) {
      console.error("Logout error:", error);
    }
  };

  // Initialize chat after auth
  async function initChat(user) {
    // Load user data from Firebase
    const userSnap = await get(ref(db, `app_users/${user.uid}`));
    
    if (!userSnap.exists()) {
      // Create user data if it doesn't exist (for manually created auth users)
      const newUserData = {
        uid: user.uid,
        name: user.email.split('@')[0],
        email: user.email,
        avatar: "👤",
        role: "user",
        createdAt: Date.now()
      };
      await set(ref(db, `app_users/${user.uid}`), newUserData);
      currentUserData = newUserData;
    } else {
      currentUserData = userSnap.val();
    }
    
    currentUser = user;
    
    // Find partner (another user, not admin)
    const allUsersSnap = await get(usersRef);
    const allUsers = allUsersSnap.val() || {};
    
    for (let uid in allUsers) {
      if (uid !== currentUser.uid && allUsers[uid].role === 'user') {
        partnerUser = { ...allUsers[uid], uid: uid };
        break;
      }
    }
    
    // Check if owner (admin)
    const isOwner = currentUser.email === "owner@secretchat.com" || currentUserData.role === 'owner';
    
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('chatContainer').style.display = 'flex';
    
    if (partnerUser) {
      document.getElementById('partnerName').innerText = partnerUser.name;
      document.getElementById('partnerAvatar').innerText = partnerUser.avatar;
    } else {
      document.getElementById('partnerName').innerText = "Chat Partner";
      document.getElementById('partnerAvatar').innerText = "👤";
    }
    
    if (isOwner) {
      document.getElementById('adminBtn').style.display = 'block';
      document.getElementById('adminBtn').onclick = () => {
        window.open('admin.html', '_blank');
      };
    }
    
    // Set online status using UID
    await set(ref(db, `user_status/${currentUser.uid}`), { online: true, lastSeen: Date.now(), name: currentUserData.name });
    onDisconnect(ref(db, `user_status/${currentUser.uid}`)).set({ online: false, lastSeen: Date.now(), name: currentUserData.name });
    
    // Watch partner status
    if (partnerUser) {
      onValue(ref(db, `user_status/${partnerUser.uid}`), (snap) => {
        const data = snap.val();
        const statusDiv = document.getElementById('onlineStatus');
        if (data && data.online) {
          statusDiv.innerHTML = '<span class="online-dot"></span><span>Online now</span>';
        } else {
          statusDiv.innerHTML = '<span class="offline-dot"></span><span>Offline</span>';
        }
      });
    }
    
    loadMessages();
    
    if (partnerUser) {
      onValue(ref(db, `user_typing/${partnerUser.uid}`), (snap) => {
        const typing = snap.val();
        if (typing) {
          document.getElementById('typingBadge').innerText = `${partnerUser.name} is typing...`;
        } else {
          document.getElementById('typingBadge').innerText = '';
        }
      });
    }
  }

  function loadMessages() {
    const messagesQuery = query(ref(db, 'chat_messages'), orderByChild('time'), limitToLast(100));
    
    onChildAdded(messagesQuery, (snapshot) => {
      const msg = snapshot.val();
      if (!msg) return;
      
      // Show messages between current user and partner
      if (!partnerUser) return;
      
      if ((msg.sender === currentUser.uid && msg.receiver === partnerUser.uid) ||
          (msg.sender === partnerUser.uid && msg.receiver === currentUser.uid)) {
        displayMessage(msg);
      }
    });
  }
  
  function displayMessage(msg) {
    const isMe = (msg.sender === currentUser.uid);
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
    
    let content = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;
    
    if (msg.fileUrl) {
      if (msg.fileType === 'image') {
        content += `<div class="media-preview"><img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')"></div>`;
      } else if (msg.fileType === 'video') {
        content += `<div class="media-preview"><video src="${msg.fileUrl}" controls></video></div>`;
      } else if (msg.fileType === 'audio') {
        content += `<audio class="voice-note" src="${msg.fileUrl}" controls></audio>`;
      }
    }
    
    // Show sender name for received messages (if multiple users)
    if (!isMe && msg.senderName) {
      content = `<div style="font-size:0.7rem; color:#00a884; margin-bottom:3px;">${escapeHtml(msg.senderName)}</div>` + content;
    }
    
    content += `<div class="message-time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
    msgDiv.innerHTML = content;
    
    document.getElementById('messagesArea').appendChild(msgDiv);
    document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
  }

  async function sendMessage(text, fileBlob = null, fileType = null) {
    if (!text && !fileBlob) return;
    if (!partnerUser) {
      alert("No chat partner available");
      return;
    }
    
    let fileUrl = null;
    let type = null;
    
    if (fileBlob) {
      const fileName = `media_${Date.now()}_${Math.random()}.${fileType === 'image' ? 'jpg' : 'mp4'}`;
      const fileRef = sRef(storage, `chat_files/${fileName}`);
      await uploadBytes(fileRef, fileBlob);
      fileUrl = await getDownloadURL(fileRef);
      type = fileType;
    }
    
    const messageData = {
      sender: currentUser.uid,
      senderName: currentUserData.name,
      receiver: partnerUser.uid,
      text: text || null,
      fileUrl: fileUrl,
      fileType: type,
      time: Date.now()
    };
    
    await push(ref(db, 'chat_messages'), messageData);
    
    if (text) {
      document.getElementById('msgInput').value = '';
    }
    
    await set(ref(db, `user_typing/${currentUser.uid}`), false);
  }

  function sendTyping() {
    if (!currentUser || !partnerUser) return;
    set(ref(db, `user_typing/${currentUser.uid}`), true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      set(ref(db, `user_typing/${currentUser.uid}`), false);
    }, 2000);
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.start();
      document.getElementById('voiceBtn').classList.add('recording');
      
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        const audioRef = sRef(storage, `audio/voice_${Date.now()}.webm`);
        await uploadBytes(audioRef, audioBlob);
        const audioUrl = await getDownloadURL(audioRef);
        
        await push(ref(db, 'chat_messages'), {
          sender: currentUser.uid,
          senderName: currentUserData.name,
          receiver: partnerUser.uid,
          text: null,
          fileUrl: audioUrl,
          fileType: 'audio',
          time: Date.now()
        });
        
        stream.getTracks().forEach(track => track.stop());
        document.getElementById('voiceBtn').classList.remove('recording');
      };
    } catch(e) {
      alert("Microphone access required");
    }
  }
  
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }

  // Auth state listener
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await initChat(user);
    }
  });

  // Event listeners
  document.getElementById('sendBtn').onclick = () => {
    const text = document.getElementById('msgInput').value.trim();
    if (text) sendMessage(text);
  };
  
  document.getElementById('msgInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      sendMessage(e.target.value.trim());
    }
  };
  
  document.getElementById('msgInput').oninput = () => sendTyping();
  
  document.getElementById('attachBtn').onclick = () => {
    document.getElementById('fileUpload').click();
  };
  
  document.getElementById('fileUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 5 * 1024 * 1024) {
        alert("File too large (max 5MB)");
        return;
      }
      const type = file.type.startsWith('image/') ? 'image' : 'video';
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const blob = await fetch(ev.target.result).then(r => r.blob());
        await sendMessage(null, blob, type);
      };
      reader.readAsDataURL(file);
    }
    e.target.value = '';
  };
  
  document.getElementById('voiceBtn').onmousedown = startRecording;
  document.getElementById('voiceBtn').onmouseup = stopRecording;
  document.getElementById('voiceBtn').ontouchstart = startRecording;
  document.getElementById('voiceBtn').ontouchend = stopRecording;
</script>
</body>
</html>

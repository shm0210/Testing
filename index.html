<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>✦ SECURE CHAT ✦ E2E Encrypted</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #0b141a;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, sans-serif;
      height: 100vh;
      overflow: hidden;
      position: fixed;
      width: 100%;
    }

    /* Login Screen */
    .login-screen {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(145deg, #0a0f12 0%, #11181f 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
      overflow-y: auto;
    }

    .login-card {
      background: #202c33;
      padding: 2rem 1.5rem;
      border-radius: 2rem;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5);
      border: 1px solid rgba(0,168,132,0.3);
    }

    .login-card h1 {
      font-size: 1.8rem;
      text-align: center;
      background: linear-gradient(135deg, #00d4b4, #00a884);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 0.5rem;
    }

    .login-tabs {
      display: flex;
      gap: 0.5rem;
      margin: 1.5rem 0 1rem;
    }

    .tab-btn {
      flex: 1;
      padding: 0.8rem;
      background: #2a3942;
      border: none;
      border-radius: 2rem;
      color: #8696a0;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .tab-btn.active {
      background: #00a884;
      color: #111b21;
    }

    .login-form {
      display: none;
    }

    .login-form.active {
      display: block;
    }

    .login-card input {
      width: 100%;
      padding: 1rem 1.2rem;
      margin: 0.5rem 0;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 1rem;
      transition: all 0.2s;
    }

    .login-card input:focus {
      outline: none;
      background: #2f414c;
      box-shadow: 0 0 0 2px #00a884;
    }

    .login-card button {
      width: 100%;
      padding: 1rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 800;
      font-size: 1rem;
      margin-top: 1rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .login-card button:active { transform: scale(0.97); }
    .login-card button:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-msg {
      color: #ff6b6b;
      font-size: 0.75rem;
      text-align: center;
      margin-top: 0.5rem;
    }

    /* Chat Container */
    .chat-container {
      display: none;
      height: 100vh;
      flex-direction: column;
      background: #0b141a;
    }

    .chat-header {
      background: #202c33;
      padding: 0.8rem 1rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #2e3b42;
    }

    .partner-info {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      cursor: pointer;
      flex: 1;
    }

    .partner-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      position: relative;
    }

    .online-dot, .offline-dot {
      position: absolute;
      bottom: 2px;
      right: 2px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid #202c33;
    }

    .online-dot { background: #00a884; animation: pulse 1.5s infinite; }
    .offline-dot { background: #5e6f7e; }

    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .partner-details h3 { font-size: 1rem; font-weight: 600; }
    .partner-details p { font-size: 0.7rem; color: #8696a0; }

    .header-btns {
      display: flex;
      gap: 0.5rem;
    }

    .header-btns button, .profile-modal-btn {
      background: #2a3942;
      border: none;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      color: #e9edef;
      font-size: 1.2rem;
      cursor: pointer;
      transition: all 0.2s;
    }

    .header-btns button:active { transform: scale(0.95); }

    .messages-area {
      flex: 1;
      overflow-y: auto;
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.3rem;
    }

    .message {
      max-width: 75%;
      padding: 0.6rem 1rem;
      border-radius: 1.2rem;
      animation: fadeMsg 0.2s ease;
      word-wrap: break-word;
      position: relative;
    }

    @keyframes fadeMsg {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .message.sent {
      background: #005c4b;
      align-self: flex-end;
      border-bottom-right-radius: 0.3rem;
    }

    .message.received {
      background: #202c33;
      align-self: flex-start;
      border-bottom-left-radius: 0.3rem;
    }

    .message-text { font-size: 0.9rem; line-height: 1.4; }
    .message-time {
      font-size: 0.6rem;
      color: #8696a0;
      text-align: right;
      margin-top: 0.2rem;
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 0.2rem;
    }

    .message-status {
      font-size: 0.55rem;
    }

    .media-preview {
      max-width: 200px;
      border-radius: 0.8rem;
      margin-top: 0.3rem;
      cursor: pointer;
    }
    .media-preview img, .media-preview video { width: 100%; border-radius: 0.8rem; max-height: 150px; object-fit: cover; }
    .voice-note { width: 160px; margin-top: 0.3rem; }

    .typing-badge {
      padding: 0.2rem 1rem;
      font-size: 0.7rem;
      color: #00a884;
      font-style: italic;
      height: 28px;
    }

    .input-area {
      background: #202c33;
      padding: 0.7rem 1rem;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      border-top: 1px solid #2e3b42;
    }

    .input-area input {
      flex: 1;
      padding: 0.8rem 1.2rem;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      font-size: 0.9rem;
      outline: none;
    }

    .action-btn {
      background: #2a3942;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      font-size: 1.2rem;
      cursor: pointer;
      color: #e9edef;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .action-btn:active { transform: scale(0.95); }
    .send-btn { background: #00a884; color: #111b21; }
    .recording { background: #ff4444 !important; animation: blink 0.8s infinite; }

    @keyframes blink {
      0%,100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    /* Profile Modal */
    .profile-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 2000;
    }

    .profile-modal-content {
      background: #202c33;
      border-radius: 2rem;
      padding: 2rem;
      width: 90%;
      max-width: 350px;
      text-align: center;
    }

    .profile-avatar-large {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: linear-gradient(145deg, #00d4b4, #00a884);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      margin: 0 auto 1rem;
      cursor: pointer;
    }

    .profile-modal input {
      width: 100%;
      padding: 0.8rem;
      margin: 0.5rem 0;
      border: none;
      border-radius: 2rem;
      background: #2a3942;
      color: #e9edef;
      text-align: center;
    }

    .profile-modal button {
      padding: 0.8rem 1.5rem;
      margin: 0.5rem;
      border: none;
      border-radius: 2rem;
      background: #00a884;
      color: #111b21;
      font-weight: 600;
      cursor: pointer;
    }

    .close-modal {
      background: #2a3942;
      color: #e9edef;
    }

    .messages-area::-webkit-scrollbar { width: 4px; }
    .messages-area::-webkit-scrollbar-track { background: #1a252c; }
    .messages-area::-webkit-scrollbar-thumb { background: #00a884; border-radius: 4px; }
  </style>
</head>
<body>

<!-- Login Screen -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✦ SECURE CHAT ✦</h1>
    <div class="login-tabs">
      <button class="tab-btn active" onclick="switchTab('login')">Login</button>
      <button class="tab-btn" onclick="switchTab('signup')">Sign Up</button>
    </div>
    
    <!-- Login Form -->
    <div id="loginForm" class="login-form active">
      <input type="email" id="loginEmail" placeholder="Email" autocomplete="email">
      <input type="password" id="loginPassword" placeholder="Password" autocomplete="current-password">
      <button id="loginBtn">✦ LOGIN ✦</button>
      <div id="loginError" class="error-msg"></div>
    </div>
    
    <!-- Signup Form -->
    <div id="signupForm" class="login-form">
      <input type="text" id="signupName" placeholder="Full Name">
      <input type="email" id="signupEmail" placeholder="Email">
      <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
      <button id="signupBtn">✦ CREATE ACCOUNT ✦</button>
      <div id="signupError" class="error-msg"></div>
    </div>
  </div>
</div>

<!-- Profile Modal -->
<div class="profile-modal" id="profileModal">
  <div class="profile-modal-content">
    <div class="profile-avatar-large" id="profileAvatarLarge" onclick="changeAvatar()">
      😎
    </div>
    <input type="text" id="profileNameInput" placeholder="Your Name">
    <input type="email" id="profileEmailInput" disabled placeholder="Email">
    <button onclick="updateProfile()">Save Changes</button>
    <button class="close-modal" onclick="closeProfileModal()">Close</button>
    <button onclick="logout()" style="background:#ff4444; color:white;">Logout</button>
  </div>
</div>

<!-- Chat Container -->
<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info" onclick="openProfileModal()">
      <div class="partner-avatar" id="myAvatar">
        😎
        <span id="myOnlineDot" class="online-dot"></span>
      </div>
      <div class="partner-details">
        <h3 id="myName">Loading...</h3>
        <p id="myStatus">Click to edit profile</p>
      </div>
    </div>
    <div class="header-btns">
      <button id="settingsBtn" onclick="openProfileModal()">👤</button>
    </div>
  </div>
  
  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>
  
  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*,audio/*" style="display:none">
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, updateProfile, signOut, onAuthStateChanged } from 'firebase/auth';
  import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, serverTimestamp, get, query, orderByChild, limitToLast } from 'firebase/database';
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL, deleteObject } from 'firebase/storage';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);
  const storage = getStorage(app);
  
  let currentUser = null;
  let currentUserData = null;
  let partnerUser = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let typingTimeout = null;
  let messagesListener = null;

  // Allowed emails
  const ALLOWED_EMAILS = ['sp@sv.com', 'sv@sp.com'];

  function switchTab(tab) {
    const loginForm = document.getElementById('loginForm');
    const signupForm = document.getElementById('signupForm');
    const tabs = document.querySelectorAll('.tab-btn');
    
    tabs.forEach(btn => btn.classList.remove('active'));
    
    if (tab === 'login') {
      loginForm.classList.add('active');
      signupForm.classList.remove('active');
      tabs[0].classList.add('active');
    } else {
      loginForm.classList.remove('active');
      signupForm.classList.add('active');
      tabs[1].classList.add('active');
    }
  }
  window.switchTab = switchTab;

  // Login
  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;
    const errorDiv = document.getElementById('loginError');
    
    if (!ALLOWED_EMAILS.includes(email)) {
      errorDiv.innerText = 'Only authorized emails can login';
      return;
    }
    
    try {
      const userCredential = await signInWithEmailAndPassword(auth, email, password);
      errorDiv.innerText = '';
    } catch (error) {
      errorDiv.innerText = error.message;
    }
  };
  
  // Signup
  document.getElementById('signupBtn').onclick = async () => {
    const name = document.getElementById('signupName').value.trim();
    const email = document.getElementById('signupEmail').value.trim();
    const password = document.getElementById('signupPassword').value;
    const errorDiv = document.getElementById('signupError');
    
    if (!ALLOWED_EMAILS.includes(email)) {
      errorDiv.innerText = 'Only authorized emails can sign up';
      return;
    }
    
    if (!name) {
      errorDiv.innerText = 'Please enter your name';
      return;
    }
    
    if (password.length < 6) {
      errorDiv.innerText = 'Password must be at least 6 characters';
      return;
    }
    
    try {
      const userCredential = await createUserWithEmailAndPassword(auth, email, password);
      await updateProfile(userCredential.user, { displayName: name });
      
      // Save user data to database
      await set(ref(db, `users/${userCredential.user.uid}`), {
        name: name,
        email: email,
        avatar: getRandomAvatar(),
        lastSeen: Date.now(),
        online: true,
        createdAt: Date.now()
      });
      
      errorDiv.innerText = '';
    } catch (error) {
      errorDiv.innerText = error.message;
    }
  };
  
  function getRandomAvatar() {
    const avatars = ['😎', '😊', '🔥', '⭐', '💎', '🌟', '🎉', '💪', '🤖', '🦄'];
    return avatars[Math.floor(Math.random() * avatars.length)];
  }
  
  function changeAvatar() {
    const newAvatar = prompt('Choose an emoji for your avatar:', currentUserData?.avatar || '😎');
    if (newAvatar && newAvatar.length <= 2) {
      updateProfileAvatar(newAvatar);
    }
  }
  window.changeAvatar = changeAvatar;
  
  async function updateProfileAvatar(avatar) {
    if (!currentUser) return;
    await set(ref(db, `users/${currentUser.uid}/avatar`), avatar);
    currentUserData.avatar = avatar;
    document.getElementById('myAvatar').innerHTML = avatar + '<span id="myOnlineDot" class="online-dot"></span>';
    document.getElementById('profileAvatarLarge').innerText = avatar;
  }
  
  async function updateProfile() {
    const newName = document.getElementById('profileNameInput').value.trim();
    if (newName && currentUser) {
      await updateProfile(currentUser, { displayName: newName });
      await set(ref(db, `users/${currentUser.uid}/name`), newName);
      currentUserData.name = newName;
      document.getElementById('myName').innerText = newName;
      alert('Profile updated successfully!');
    }
  }
  window.updateProfile = updateProfile;
  
  function openProfileModal() {
    if (currentUserData) {
      document.getElementById('profileAvatarLarge').innerText = currentUserData.avatar || '😎';
      document.getElementById('profileNameInput').value = currentUserData.name || '';
      document.getElementById('profileEmailInput').value = currentUser.email;
      document.getElementById('profileModal').style.display = 'flex';
    }
  }
  window.openProfileModal = openProfileModal;
  
  function closeProfileModal() {
    document.getElementById('profileModal').style.display = 'none';
  }
  window.closeProfileModal = closeProfileModal;
  
  async function logout() {
    if (currentUser) {
      await set(ref(db, `users/${currentUser.uid}/online`), false);
      await set(ref(db, `users/${currentUser.uid}/lastSeen`), Date.now());
    }
    await signOut(auth);
    window.location.reload();
  }
  window.logout = logout;
  
  // Get partner (the other authorized user)
  async function getPartner(currentUserId) {
    const usersSnap = await get(ref(db, 'users'));
    if (usersSnap.exists()) {
      const users = usersSnap.val();
      for (let uid in users) {
        if (uid !== currentUserId && ALLOWED_EMAILS.includes(users[uid].email)) {
          return { uid, ...users[uid] };
        }
      }
    }
    return null;
  }
  
  // Setup chat after login
  async function setupChat(user) {
    currentUser = user;
    
    // Get user data from database
    const userSnap = await get(ref(db, `users/${user.uid}`));
    if (userSnap.exists()) {
      currentUserData = userSnap.val();
    } else {
      currentUserData = {
        name: user.displayName || user.email.split('@')[0],
        email: user.email,
        avatar: getRandomAvatar(),
        online: true,
        lastSeen: Date.now()
      };
      await set(ref(db, `users/${user.uid}`), currentUserData);
    }
    
    // Get partner
    partnerUser = await getPartner(user.uid);
    
    // Update UI
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('chatContainer').style.display = 'flex';
    document.getElementById('myName').innerText = currentUserData.name;
    document.getElementById('myAvatar').innerHTML = currentUserData.avatar + '<span id="myOnlineDot" class="online-dot"></span>';
    document.getElementById('myStatus').innerText = currentUserData.email;
    
    // Set online status
    await set(ref(db, `users/${user.uid}/online`), true);
    await set(ref(db, `users/${user.uid}/lastSeen`), serverTimestamp());
    onDisconnect(ref(db, `users/${user.uid}`)).update({ online: false, lastSeen: serverTimestamp() });
    
    // Load messages
    loadMessages();
    
    // Setup typing indicator
    if (partnerUser) {
      onValue(ref(db, `typing/${partnerUser.uid}`), (snap) => {
        const typing = snap.val();
        document.getElementById('typingBadge').innerHTML = typing ? `${partnerUser.name} is typing...` : '';
      });
    }
  }
  
  function loadMessages() {
    if (messagesListener) messagesListener();
    
    const chatId = getChatId(currentUser.uid, partnerUser?.uid);
    const messagesQuery = query(ref(db, `messages/${chatId}`), orderByChild('timestamp'), limitToLast(50));
    
    messagesListener = onChildAdded(messagesQuery, (snapshot) => {
      const msg = snapshot.val();
      if (msg) displayMessage(msg);
    });
  }
  
  function getChatId(uid1, uid2) {
    return uid1 < uid2 ? `${uid1}_${uid2}` : `${uid2}_${uid1}`;
  }
  
  function displayMessage(msg) {
    const isMe = msg.senderId === currentUser.uid;
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isMe ? 'sent' : 'received'}`;
    
    let content = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;
    
    if (msg.fileUrl) {
      if (msg.fileType === 'image') {
        content += `<div class="media-preview"><img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')"></div>`;
      } else if (msg.fileType === 'video') {
        content += `<div class="media-preview"><video src="${msg.fileUrl}" controls></video></div>`;
      } else if (msg.fileType === 'audio') {
        content += `<audio class="voice-note" src="${msg.fileUrl}" controls></audio>`;
      }
    }
    
    const time = new Date(msg.timestamp);
    const timeStr = time.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
    const statusStr = msg.status === 'delivered' ? '✓✓' : '✓';
    
    content += `<div class="message-time">${timeStr} <span class="message-status">${isMe ? statusStr : ''}</span></div>`;
    msgDiv.innerHTML = content;
    
    document.getElementById('messagesArea').appendChild(msgDiv);
    document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
  }
  
  async function sendMessage(text, fileBlob = null, fileType = null) {
    if (!text && !fileBlob) return;
    if (!partnerUser) return;
    
    let fileUrl = null;
    let type = null;
    
    if (fileBlob) {
      const ext = fileType === 'image' ? 'jpg' : (fileType === 'video' ? 'mp4' : 'webm');
      const fileName = `media_${Date.now()}.${ext}`;
      const fileRef = sRef(storage, `chats/${getChatId(currentUser.uid, partnerUser.uid)}/${fileName}`);
      await uploadBytes(fileRef, fileBlob);
      fileUrl = await getDownloadURL(fileRef);
      type = fileType;
    }
    
    const chatId = getChatId(currentUser.uid, partnerUser.uid);
    const messageData = {
      senderId: currentUser.uid,
      senderName: currentUserData.name,
      receiverId: partnerUser.uid,
      text: text || null,
      fileUrl: fileUrl,
      fileType: type,
      timestamp: Date.now(),
      status: 'sent'
    };
    
    const newMsgRef = push(ref(db, `messages/${chatId}`));
    await set(newMsgRef, messageData);
    
    if (text) {
      document.getElementById('msgInput').value = '';
    }
    
    // Clear typing
    await set(ref(db, `typing/${currentUser.uid}`), false);
  }
  
  function sendTyping() {
    if (!currentUser || !partnerUser) return;
    set(ref(db, `typing/${currentUser.uid}`), true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      set(ref(db, `typing/${currentUser.uid}`), false);
    }, 2000);
  }
  
  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.start();
      document.getElementById('voiceBtn').classList.add('recording');
      
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        await sendMessage(null, audioBlob, 'audio');
        stream.getTracks().forEach(track => track.stop());
        document.getElementById('voiceBtn').classList.remove('recording');
      };
    } catch(e) {
      alert("Microphone access required for voice messages");
    }
  }
  
  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') {
      mediaRecorder.stop();
    }
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Event listeners
  document.getElementById('sendBtn').onclick = () => {
    const text = document.getElementById('msgInput').value.trim();
    if (text) sendMessage(text);
  };
  
  document.getElementById('msgInput').onkeypress = (e) => {
    if (e.key === 'Enter') {
      sendMessage(e.target.value.trim());
    }
  };
  
  document.getElementById('msgInput').oninput = () => sendTyping();
  
  document.getElementById('attachBtn').onclick = () => {
    document.getElementById('fileUpload').click();
  };
  
  document.getElementById('fileUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 10 * 1024 * 1024) {
        alert("File too large (max 10MB)");
        return;
      }
      let type = 'file';
      if (file.type.startsWith('image/')) type = 'image';
      else if (file.type.startsWith('video/')) type = 'video';
      else if (file.type.startsWith('audio/')) type = 'audio';
      
      await sendMessage(null, file, type);
    }
    e.target.value = '';
  };
  
  document.getElementById('voiceBtn').onmousedown = startRecording;
  document.getElementById('voiceBtn').onmouseup = stopRecording;
  document.getElementById('voiceBtn').ontouchstart = startRecording;
  document.getElementById('voiceBtn').ontouchend = stopRecording;
  
  // Auth state listener
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      if (ALLOWED_EMAILS.includes(user.email)) {
        await setupChat(user);
      } else {
        await signOut(auth);
        alert('Unauthorized email. Only sp@sv.com and sv@sp.com are allowed.');
        window.location.reload();
      }
    }
  });
  
  // Enter key on login/signup
  document.getElementById('loginPassword').onkeypress = (e) => {
    if (e.key === 'Enter') document.getElementById('loginBtn').click();
  };
  document.getElementById('signupPassword').onkeypress = (e) => {
    if (e.key === 'Enter') document.getElementById('signupBtn').click();
  };
</script>
</body>
</html>

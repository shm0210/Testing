<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>◈ SECURE CHAT ◈</title>
  <style>
    * {margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    body {background:#0b141a;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,sans-serif;height:100vh;overflow:hidden;position:fixed;width:100%;color:#e9edef}
   .login-screen {position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(145deg,#0a0f12 0%,#11181f 100%);display:flex;justify-content:center;align-items:center;z-index:1000}
   .login-card {background:#202c33;padding:2.5rem 1.8rem;border-radius:2rem;width:90%;max-width:360px;box-shadow:0 20px 40px rgba(0,0,0,0.5);border:1px solid rgba(0,168,132,0.3);animation:fadeInUp 0.4s ease}
    @keyframes fadeInUp {from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
   .login-card h1 {font-size:2rem;text-align:center;background:linear-gradient(135deg,#00d4b4,#00a884);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:0.5rem}
   .login-card.sub {text-align:center;color:#8696a0;font-size:0.7rem;margin-bottom:1.8rem}
   .login-card input {width:100%;padding:1rem 1.2rem;margin:0.8rem 0;border:none;border-radius:2rem;background:#2a3942;color:#e9edef;font-size:1rem;text-align:center;transition:all 0.2s}
   .login-card input:focus {outline:none;background:#2f414c;box-shadow:0 0 0 2px #00a884}
   .login-card button {width:100%;padding:1rem;border:none;border-radius:2rem;background:#00a884;color:#111b21;font-weight:800;font-size:1rem;margin-top:1rem;cursor:pointer;transition:all 0.2s}
   .login-card button:active {transform:scale(0.97)}
   .chat-container {display:none;height:100vh;flex-direction:column;background:#0b141a}
   .chat-header {background:#202c33;padding:0.8rem 1rem;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2e3b42}
   .partner-info {display:flex;align-items:center;gap:0.8rem}
   .partner-avatar {width:48px;height:48px;border-radius:50%;background:linear-gradient(145deg,#00d4b4,#00a884);display:flex;align-items:center;justify-content:center;font-size:1.8rem}
   .partner-details h3 {font-size:1rem;font-weight:600}
   .online-status {display:flex;align-items:center;gap:0.3rem;font-size:0.7rem;color:#8696a0}
   .online-dot {width:8px;height:8px;background:#00a884;border-radius:50%;animation:pulse 1.5s infinite}
   .offline-dot {width:8px;height:8px;background:#5e6f7e;border-radius:50%}
    @keyframes pulse {0%,100%{opacity:1}50%{opacity:0.5}}
   .header-btns button {background:#2a3942;border:none;width:40px;height:40px;border-radius:50%;color:#e9edef;font-size:1.2rem;cursor:pointer}
   .messages-area {flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:0.3rem}
   .message {max-width:75%;padding:0.6rem 1rem;border-radius:1.2rem;animation:fadeMsg 0.2s ease;word-wrap:break-word}
    @keyframes fadeMsg {from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
   .message.sent {background:#005c4b;align-self:flex-end;border-bottom-right-radius:0.3rem}
   .message.received {background:#202c33;align-self:flex-start;border-bottom-left-radius:0.3rem}
   .message-text {font-size:0.9rem;line-height:1.4}
   .message-time {font-size:0.6rem;color:#8696a0;text-align:right;margin-top:0.2rem}
   .media-preview {max-width:200px;border-radius:0.8rem;margin-top:0.3rem;cursor:pointer}
   .media-preview img,.media-preview video {width:100%;border-radius:0.8rem;max-height:150px;object-fit:cover}
   .voice-note {width:160px;margin-top:0.3rem}
   .typing-badge {padding:0.2rem 1rem;font-size:0.7rem;color:#00a884;font-style:italic;height:28px}
   .input-area {background:#202c33;padding:0.7rem 1rem;display:flex;gap:0.6rem;align-items:center;border-top:1px solid #2e3b42}
   .input-area input {flex:1;padding:0.8rem 1.2rem;border:none;border-radius:2rem;background:#2a3942;color:#e9edef;font-size:0.9rem;outline:none}
   .action-btn {background:#2a3942;border:none;width:44px;height:44px;border-radius:50%;font-size:1.2rem;cursor:pointer;color:#e9edef;display:inline-flex;align-items:center;justify-content:center}
   .action-btn:active {transform:scale(0.95)}
   .send-btn {background:#00a884;color:#111b21}
   .recording {background:#ff4444!important;animation:blink 0.8s infinite}
    @keyframes blink {0%,100%{opacity:1}50%{opacity:0.6}}
   .messages-area::-webkit-scrollbar {width:4px}
   .messages-area::-webkit-scrollbar-track {background:#1a252c}
   .messages-area::-webkit-scrollbar-thumb {background:#00a884;border-radius:4px}
  </style>
</head>
<body>

<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h1>✦ SECURE CHAT ✦</h1>
    <div class="sub">PRIVATE • ENCRYPTED • REAL-TIME</div>
    <input type="email" id="emailInput" placeholder="EMAIL" autocomplete="off">
    <input type="password" id="passInput" placeholder="PASSWORD" autocomplete="off">
    <button id="loginBtn">✦ LOGIN ✦</button>
  </div>
</div>

<div class="chat-container" id="chatContainer">
  <div class="chat-header">
    <div class="partner-info">
      <div class="partner-avatar" id="partnerAvatar">👤</div>
      <div class="partner-details">
        <h3 id="partnerName">Loading...</h3>
        <div class="online-status" id="onlineStatus">
          <span class="offline-dot"></span>
          <span id="statusText">Offline</span>
        </div>
      </div>
    </div>
    <div class="header-btns">
      <button id="adminBtn" style="display:none;">⚙️</button>
      <button id="logoutBtn">🚪</button>
    </div>
  </div>
  <div class="messages-area" id="messagesArea"></div>
  <div class="typing-badge" id="typingBadge"></div>
  <div class="input-area">
    <button id="attachBtn" class="action-btn">📎</button>
    <input type="text" id="msgInput" placeholder="Message..." autocomplete="off">
    <button id="voiceBtn" class="action-btn">🎤</button>
    <button id="sendBtn" class="action-btn send-btn">➤</button>
  </div>
  <input type="file" id="fileUpload" accept="image/*,video/*" style="display:none">
</div>

<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js",
      "firebase/database": "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js",
      "firebase/storage": "https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js"
    }
  }
</script>

<script type="module">
  import { initializeApp } from 'firebase/app';
  import { getDatabase, ref, push, onChildAdded, onValue, set, onDisconnect, get } from 'firebase/database';
  import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'firebase/storage';
  import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut } from 'firebase/auth';

  const firebaseConfig = {
    apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
    authDomain: "secret-chat-ce77a.firebaseapp.com",
    databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "secret-chat-ce77a",
    storageBucket: "secret-chat-ce77a.appspot.com",
    messagingSenderId: "332764244582",
    appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const storage = getStorage(app);
  const auth = getAuth(app);
  const messagesRef = ref(db, 'chat_messages');

  let currentUser = null;
  let partnerUser = null;
  let mediaRecorder = null;
  let audioChunks = [];
  let typingTimeout = null;

  const USERS = {
    "sv@sp.com": { name: "Shubham", avatar: "😎" },
    "sp@sv.com": { name: "Sakshi", avatar: "🌸" }
  };

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const email = user.email.toLowerCase();
      currentUser = {
        uid: user.uid,
        email: email,
        name: USERS[email]?.name || email.split('@')[0],
        avatar: USERS[email]?.avatar || "👤",
        role: email === "sv@sp.com"? "owner" : "user"
      };

      const partnerEmail = email === "sv@sp.com"? "sp@sv.com" : "sv@sp.com";
      partnerUser = {
        email: partnerEmail,
        name: USERS[partnerEmail].name,
        avatar: USERS[partnerEmail].avatar
      };

      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('chatContainer').style.display = 'flex';
      document.getElementById('partnerName').innerText = partnerUser.name;
      document.getElementById('partnerAvatar').innerText = partnerUser.avatar;

      if (currentUser.role === 'owner') {
        document.getElementById('adminBtn').style.display = 'block';
        document.getElementById('adminBtn').onclick = () => window.open('admin.html', '_blank');
      }

      await set(ref(db, `user_status/${currentUser.uid}`), { online: true, lastSeen: Date.now(), email: currentUser.email });
      onDisconnect(ref(db, `user_status/${currentUser.uid}`)).set({ online: false, lastSeen: Date.now(), email: currentUser.email });

      onValue(ref(db, `user_status`), (snap) => {
        const statuses = snap.val() || {};
        let partnerOnline = false;
        for (let uid in statuses) {
          if (statuses[uid].email === partnerUser.email && statuses[uid].online) {
            partnerOnline = true;
            break;
          }
        }
        const statusDiv = document.getElementById('onlineStatus');
        statusDiv.innerHTML = partnerOnline? '<span class="online-dot"></span><span>Online now</span>' : '<span class="offline-dot"></span><span>Offline</span>';
      });

      onValue(ref(db, `user_typing/${partnerUser.email.replace(/[.@]/g, '_')}`), (snap) => {
        document.getElementById('typingBadge').innerText = snap.val()? `${partnerUser.name} is typing...` : '';
      });

      loadMessages();

    } else {
      document.getElementById('loginScreen').style.display = 'flex';
      document.getElementById('chatContainer').style.display = 'none';
    }
  });

  function loadMessages() {
    onChildAdded(messagesRef, (snapshot) => {
      const msg = snapshot.val();
      if (!msg) return;
      if ((msg.senderEmail === currentUser.email && msg.receiverEmail === partnerUser.email) ||
          (msg.senderEmail === partnerUser.email && msg.receiverEmail === currentUser.email)) {
        displayMessage(msg);
      }
    });
  }

  function displayMessage(msg) {
    const isMe = (msg.senderEmail === currentUser.email);
    const msgDiv = document.createElement('div');
    msgDiv.className = `message ${isMe? 'sent' : 'received'}`;
    let content = `<div class="message-text">${escapeHtml(msg.text || '')}</div>`;
    if (msg.fileUrl) {
      if (msg.fileType === 'image') {
        content += `<div class="media-preview"><img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')"></div>`;
      } else if (msg.fileType === 'video') {
        content += `<div class="media-preview"><video src="${msg.fileUrl}" controls></video></div>`;
      } else if (msg.fileType === 'audio') {
        content += `<audio class="voice-note" src="${msg.fileUrl}" controls></audio>`;
      }
    }
    content += `<div class="message-time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</div>`;
    msgDiv.innerHTML = content;
    document.getElementById('messagesArea').appendChild(msgDiv);
    document.getElementById('messagesArea').scrollTop = document.getElementById('messagesArea').scrollHeight;
  }

  async function sendMessage(text, fileBlob = null, fileType = null) {
    if (!text &&!fileBlob) return;
    let fileUrl = null;
    if (fileBlob) {
      const ext = fileType === 'image'? 'jpg' : fileType === 'audio'? 'webm' : 'mp4';
      const fileRef = sRef(storage, `chat_files/${Date.now()}.${ext}`);
      await uploadBytes(fileRef, fileBlob);
      fileUrl = await getDownloadURL(fileRef);
    }
    await push(messagesRef, {
      senderUid: currentUser.uid,
      senderEmail: currentUser.email,
      sender: currentUser.name,
      receiverEmail: partnerUser.email,
      receiver: partnerUser.name,
      text: text || null,
      fileUrl: fileUrl,
      fileType: fileType,
      time: Date.now()
    });
    if (text) document.getElementById('msgInput').value = '';
    await set(ref(db, `user_typing/${currentUser.email.replace(/[.@]/g, '_')}`), false);
  }

  function sendTyping() {
    if (!currentUser) return;
    set(ref(db, `user_typing/${currentUser.email.replace(/[.@]/g, '_')}`), true);
    if (typingTimeout) clearTimeout(typingTimeout);
    typingTimeout = setTimeout(() => {
      set(ref(db, `user_typing/${currentUser.email.replace(/[.@]/g, '_')}`), false);
    }, 2000);
  }

  async function startRecording() {
    try {
      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      mediaRecorder = new MediaRecorder(stream);
      audioChunks = [];
      mediaRecorder.ondataavailable = (e) => audioChunks.push(e.data);
      mediaRecorder.start();
      document.getElementById('voiceBtn').classList.add('recording');
      mediaRecorder.onstop = async () => {
        const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
        await sendMessage(null, audioBlob, 'audio');
        stream.getTracks().forEach(track => track.stop());
        document.getElementById('voiceBtn').classList.remove('recording');
      };
    } catch(e) { alert("Microphone access required"); }
  }

  function stopRecording() {
    if (mediaRecorder && mediaRecorder.state === 'recording') mediaRecorder.stop();
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m]));
  }

  document.getElementById('loginBtn').onclick = async () => {
    const email = document.getElementById('emailInput').value;
    const pass = document.getElementById('passInput').value;
    try { await signInWithEmailAndPassword(auth, email, pass); }
    catch(e) { alert("Login failed: " + e.message); }
  };

  document.getElementById('logoutBtn').onclick = () => signOut(auth);
  document.getElementById('sendBtn').onclick = () => sendMessage(document.getElementById('msgInput').value.trim());
  document.getElementById('msgInput').onkeypress = (e) => { if (e.key === 'Enter') sendMessage(e.target.value.trim()); };
  document.getElementById('msgInput').oninput = () => sendTyping();
  document.getElementById('attachBtn').onclick = () => document.getElementById('fileUpload').click();
  document.getElementById('fileUpload').onchange = async (e) => {
    const file = e.target.files[0];
    if (file) {
      if (file.size > 5 * 1024) { alert("File too large (max 5MB)"); return; }
      const type = file.type.startsWith('image/')? 'image' : 'video';
      await sendMessage(null, file, type);
    }
    e.target.value = '';
  };
  document.getElementById('voiceBtn').onmousedown = startRecording;
  document.getElementById('voiceBtn').onmouseup = stopRecording;
  document.getElementById('voiceBtn').ontouchstart = startRecording;
  document.getElementById('voiceBtn').ontouchend = stopRecording;
</script>
</body>
</html>

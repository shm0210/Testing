<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Access Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div id="login-screen" class="screen active">
            <div class="login-card">
                <div class="brand-header">
                    <h1>🔒 Secure Vault</h1>
                    <p>Enter your credentials to continue</p>
                </div>
                
                <form id="login-form">
                    <div class="input-group">
                        <label for="password">Access Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Enter your secret password" required>
                            <button type="button" id="toggle-password" class="password-toggle">👁️</button>
                        </div>
                    </div>
                    
                    <button type="submit" id="submit-btn" class="submit-button">
                        <span class="button-text">Authenticate</span>
                        <div class="spinner hidden"></div>
                    </button>
                </form>
                
                <div id="error-message" class="error-message hidden"></div>
                
                <div class="security-info">
                    <p>🔐 All data is encrypted and stored locally</p>
                </div>
            </div>
        </div>
        
        <div id="content-screen" class="screen hidden">
            <header class="content-header">
                <h1 id="page-title">Welcome</h1>
                <button id="logout-btn" class="logout-button">🚪 Logout</button>
            </header>
            
            <main id="content-area" class="content-area">
                <!-- Dynamic content will be loaded here -->
            </main>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>

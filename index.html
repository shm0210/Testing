<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>2020~FIRST TIME | Secret Chat</title>
  <style>
    :root {
      --bg: #0b141a;
      --panel: #202c33;
      --accent: #00a884;
      --text: #e9edef;
      --msg-me: #005c4b;
      --msg-other: #202c33;
      --input: #2a3942;
    }
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
    body{background:var(--bg);color:var(--text);height:100vh;overflow:hidden}

    /* Login */
    #login{display:flex;height:100vh;justify-content:center;align-items:center;background:linear-gradient(135deg,#111b21 0%,#0a1117 100%);padding:20px}
    #login::after{content:'2020~FIRST TIME';position:fixed;bottom:15px;width:100%;text-align:center;font-size:10px;color:rgba(255,255,255,0.1);letter-spacing:3px}
   .box{background:var(--panel);padding:35px 30px;border-radius:24px;text-align:center;width:100%;max-width:360px;box-shadow:0 20px 50px rgba(0,0,0,0.6);border:1px solid rgba(0,168,132,0.2);animation:slideUp 0.5s}
    @keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
   .box h2{margin-bottom:8px;font-size:26px;background:linear-gradient(135deg,#00a884,#00d4b4);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
   .box.sub{color:#8696a0;font-size:12px;margin-bottom:22px;letter-spacing:1px}
   .box input{width:100%;padding:14px 16px;margin:10px 0;border:none;border-radius:12px;background:var(--input);color:#fff;font-size:15px}
   .box input:focus{outline:none;box-shadow:0 0 0 2px var(--accent)}
   .box button{width:100%;padding:14px;border:none;border-radius:12px;background:var(--accent);color:#111b21;font-weight:700;font-size:16px;margin-top:8px;cursor:pointer}
   .user-list{margin-top:18px;font-size:11px;color:#8696a0;border-top:1px solid #2e3b42;padding-top:12px}
   .user-list span{display:inline-block;margin:3px;background:var(--input);padding:5px 10px;border-radius:20px}

    /* Chat */
    #chat{display:none;height:100vh;flex-direction:column}
    #header{background:var(--panel);padding:10px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2e3b42}
    #userInfo{display:flex;align-items:center;gap:10px;flex:1}
   .avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#00a884,#00d4b4);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:18px;color:#111b21}
    #chatTitle{font-weight:600;font-size:17px}
    #status{font-size:11px;color:#8696a0;display:flex;align-items:center;gap:5px}
   .online-dot{width:8px;height:8px;background:var(--accent);border-radius:50%;animation:pulse 1.5s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
   .header-btns{display:flex;gap:6px}
   .icon-btn{background:var(--input);border:none;color:var(--text);width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:17px;display:flex;align-items:center;justify-content:center}

    #messages{flex:1;overflow-y:auto;padding:12px 15px;background-image:url('https://www.transparenttextures.com/patterns/dark-mosaic.png');display:flex;flex-direction:column;gap:3px}
   .msg{margin:3px 0;padding:7px 11px;border-radius:12px;max-width:80%;word-wrap:break-word;animation:msgIn 0.2s}
    @keyframes msgIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
   .me{background:var(--msg-me);margin-left:auto;border-bottom-right-radius:3px}
   .other{background:var(--msg-other);margin-right:auto;border-bottom-left-radius:3px}
   .name{font-size:11px;color:#53bdeb;margin-bottom:2px;font-weight:600}
   .time{font-size:9px;color:#8696a0;margin-top:3px;text-align:right}
   .msg img,.msg video{max-width:100%;border-radius:8px;margin-top:4px;cursor:pointer}
   .msg audio{width:100%;max-width:220px;margin-top:4px}

    #typing{padding:4px 18px;font-size:11px;color:var(--accent);font-style:italic;height:24px;background:var(--bg)}
    #input-area{display:flex;padding:8px 12px;background:var(--panel);align-items:center;gap:8px;border-top:1px solid #2e3b42}
    #msgInput{flex:1;padding:11px 16px;border:none;border-radius:22px;background:var(--input);color:#fff;outline:none;font-size:15px}
   .action-btn{border:none;border-radius:50%;width:42px;height:42px;background:var(--input);color:var(--text);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
   .send-btn{background:var(--accent);color:#111b21}
   .recording{background:#ff4444!important;animation:blink 0.5s infinite}
    @keyframes blink{0%,100%{opacity:1}50%{opacity:0.6}}
    #fileInput{display:none}

    /* Admin Modal */
   .admin-modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:9999;justify-content:center;align-items:center;padding:15px}
   .admin-content{background:var(--panel);width:100%;max-width:600px;max-height:90vh;border-radius:18px;overflow-y:auto;padding:20px}
   .admin-content h3{margin-bottom:15px;color:var(--accent);font-size:20px}
   .admin-stats{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:18px}
   .stat-card{background:var(--input);padding:12px;border-radius:10px;text-align:center}
   .stat-number{font-size:26px;font-weight:bold;color:var(--accent)}
   .admin-item{background:var(--input);padding:10px 12px;margin:6px 0;border-radius:8px;display:flex;justify-content:space-between;align-items:center;font-size:13px}
   .delete-btn{background:#ff4444;border:none;padding:5px 12px;border-radius:6px;color:white;cursor:pointer;font-size:12px}
   .admin-btn{background:var(--accent);border:none;color:#111b21;padding:10px 16px;border-radius:8px;font-weight:600;margin:5px;cursor:pointer}
   .close-btn{background:#3e555f;width:100%;margin-top:12px}
   .code-box{background:#111b21;padding:12px;border-radius:8px;margin:8px 0;font-family:monospace;font-size:11px;word-break:break-all;border:1px solid #2e3b42}

    /* Responsive */
    @media(max-width:480px){
     .box{padding:30px 25px;min-width:auto}
      #header{padding:8px 12px}
     .avatar{width:38px;height:38px;font-size:16px}
      #chatTitle{font-size:16px}
     .msg{max-width:85%;font-size:15px}
     .action-btn{width:40px;height:40px;font-size:17px}
      #msgInput{font-size:16px;padding:10px 14px}
    }

    #messages::-webkit-scrollbar{width:5px}
    #messages::-webkit-scrollbar-thumb{background:#3e555f;border-radius:10px}
  </style>
</head>
<body>
  <div id="login">
    <div class="box">
      <h2>✨ 2020~FIRST TIME</h2>
      <div class="sub">Private Secure Messenger</div>
      <input id="secretCode" type="password" placeholder="Enter Secret Code" autocomplete="off">
      <button onclick="checkCode()">➤ UNLOCK CHAT</button>
      <div class="user-list">
        📋 Authorized:<br>
        <span>🔑 Shubham</span>
        <span>🔑 Sakshi</span>
        <span>👑 Owner</span>
      </div>
    </div>
  </div>

  <div id="chat">
    <div id="header">
      <div id="userInfo">
        <div class="avatar" id="myAvatar">👤</div>
        <div>
          <div id="chatTitle">Secret Chat</div>
          <div id="status"><span class="online-dot"></span><span id="statusText">Connecting...</span></div>
        </div>
      </div>
      <div class="header-btns">
        <button class="icon-btn" onclick="openAdminModal()" id="adminBtn" style="display:none;">⚙️</button>
      </div>
    <div id="messages"></div>
    <div id="typing"></div>
    <div id="input-area">
      <input type="file" id="fileInput" accept="image/*,video/*">
      <button class="action-btn" onclick="fileInput.click()">📎</button>
      <input id="msgInput" type="text" placeholder="Message..." oninput="sendTyping()" onkeydown="if(event.key==='Enter')sendMsg()">
      <button class="action-btn" id="recordBtn">🎤</button>
      <button class="action-btn send-btn" onclick="sendMsg()">➤</button>
    </div>
  </div>

  <!-- Admin Modal -->
  <div id="adminModal" class="admin-modal">
    <div class="admin-content">
      <h3>🔧 Owner Control Panel</h3>
      <div class="admin-stats">
        <div class="stat-card"><div class="stat-number" id="totalUsers">0</div><div>Users</div></div>
        <div class="stat-card"><div class="stat-number" id="onlineCount">0</div><div>Online</div></div>
      </div>
      <h4 style="margin:15px 0 8px;color:#8696a0">🔐 Secret Codes</h4>
      <div id="codeList"></div>
      <h4 style="margin:15px 0 8px;color:#8696a0">👥 Users Status</h4>
      <div id="adminUserList"></div>
      <h4 style="margin:15px 0 8px;color:#8696a0">📨 Recent Messages</h4>
      <div id="adminMsgList"></div>
      <div style="margin-top:15px">
        <button onclick="exportChatHistory()" class="admin-btn">📥 Export Chats</button>
        <button onclick="clearAllChats()" class="delete-btn" style="margin-left:8px">⚠️ Delete All</button>
        <button onclick="closeAdminModal()" class="admin-btn close-btn">Close Panel</button>
      </div>
    </div>
  </div>

  <script type="importmap">
    {"imports":{"firebase/app":"https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js","firebase/database":"https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js","firebase/storage":"https://www.gstatic.com/firebasejs/10.8.0/firebase-storage.js"}}
  </script>

  <script type="module">
    import { initializeApp } from 'firebase/app';
    import { getDatabase, ref, push, onChildAdded, onValue, set, remove, onDisconnect, serverTimestamp, get } from 'firebase/database';
    import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from 'firebase/storage';

    // ⚠️ REPLACE THIS WITH YOUR CONFIG BEFORE UPLOADING TO GITHUB ⚠️
    const FIREBASE_CONFIG = {
      apiKey: "AIzaSyBhSSspPiiocfVirSMjRPgH-pWztbnZ7fk",
      authDomain: "secret-chat-ce77a.firebaseapp.com",
      databaseURL: "https://secret-chat-ce77a-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "secret-chat-ce77a",
      storageBucket: "secret-chat-ce77a.appspot.com",
      messagingSenderId: "332764244582",
      appId: "1:332764244582:web:4f1ecef556ba1853a81ba7"
    };

    // 🔒 USER CODES - Change these to your secret codes
    const USERS = {
      "#9569@": { name: "Shubham", avatar: "😎", role: "user" },
      "#9454@": { name: "Sakshi", avatar: "🌸", role: "user" },
      "#OWNER@": { name: "Owner", avatar: "👑", role: "owner" }
    };

    const app = initializeApp(FIREBASE_CONFIG);
    const db = getDatabase(app);
    const storage = getStorage(app);
    const messagesRef = ref(db, 'messages');
    const statusRef = ref(db, 'status');
    const typingRef = ref(db, 'typing');

    let currentUser = null, mediaRecorder = null, audioChunks = [], typingTimeout = null, otherUser = null;

    window.checkCode = () => {
      const code = document.getElementById('secretCode').value.trim();
      if (USERS[code]) {
        currentUser = {...USERS[code], code};
        otherUser = Object.values(USERS).find(u => u.name!== currentUser.name && u.role === 'user');

        document.getElementById('login').style.display = 'none';
        document.getElementById('chat').style.display = 'flex';
        document.getElementById('chatTitle').innerHTML = `${currentUser.avatar} ${currentUser.name}`;
        document.getElementById('myAvatar').innerHTML = currentUser.avatar;

        if (currentUser.role === 'owner') document.getElementById('adminBtn').style.display = 'flex';

        setOnlineStatus();
        loadMessages();
        watchTyping();
        watchOtherUserStatus();
      } else {
        alert("❌ Invalid Code! Contact Owner.");
      }
    };

    function setOnlineStatus() {
      const userStatusRef = ref(db, `status/${currentUser.name}`);
      set(userStatusRef, {online: true, lastSeen: serverTimestamp()});
      onDisconnect(userStatusRef).set({online: false, lastSeen: serverTimestamp()});
    }

    function watchOtherUserStatus() {
      if (!otherUser) return;
      onValue(ref(db, `status/${otherUser.name}`), (snap) => {
        const data = snap.val();
        const statusText = document.getElementById('statusText');
        if (data?.online) {
          statusText.innerHTML = `${otherUser.name} is online`;
        } else if (data?.lastSeen) {
          const lastSeen = new Date(data.lastSeen);
          statusText.innerHTML = `Last seen ${lastSeen.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}`;
        }
      });
    }

    window.sendTyping = () => {
      if (!currentUser) return;
      set(ref(db, `typing/${currentUser.name}`), true);
      clearTimeout(typingTimeout);
      typingTimeout = setTimeout(() => set(ref(db, `typing/${currentUser.name}`), false), 2000);
    };

    function watchTyping() {
      onValue(typingRef, (snap) => {
        const typingData = snap.val() || {};
        const typingUsers = Object.keys(typingData).filter(u => u!== currentUser?.name && typingData[u] === true);
        document.getElementById('typing').innerHTML = typingUsers.length? `✍️ ${typingUsers[0]} is typing...` : '';
      });
    }

    // Voice Recording - Works on Mobile too
    const recordBtn = document.getElementById('recordBtn');
    ['mousedown','touchstart'].forEach(evt => recordBtn.addEventListener(evt, startRecording));
    ['mouseup','mouseleave','touchend','touchcancel'].forEach(evt => recordBtn.addEventListener(evt, stopRecording));

    async function startRecording(e) {
      e.preventDefault();
      try {
        const stream = await navigator.mediaDevices.getUserMedia({audio: true});
        mediaRecorder = new MediaRecorder(stream);
        audioChunks = [];
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        recordBtn.classList.add('recording');
      } catch (err) {
        alert("Microphone permission needed");
      }
    }

    function stopRecording(e) {
      e.preventDefault();
      if (mediaRecorder && mediaRecorder.state === 'recording') {
        mediaRecorder.stop();
        recordBtn.classList.remove('recording');
        mediaRecorder.onstop = async () => {
          const blob = new Blob(audioChunks, {type: 'audio/webm'});
          const audioRef = sRef(storage, `audio/${Date.now()}.webm`);
          await uploadBytes(audioRef, blob);
          const url = await getDownloadURL(audioRef);
          await push(messagesRef, {user: currentUser.name, userAvatar: currentUser.avatar, fileUrl: url, fileType: 'audio', time: Date.now()});
          mediaRecorder.stream.getTracks().forEach(track => track.stop());
        };
      }
    }

    window.sendMsg = async () => {
      const text = document.getElementById('msgInput').value.trim();
      const file = document.getElementById('fileInput').files[0];
      if (!text &&!file) return;

      let fileUrl = null, fileType = null;
      if (file) {
        const fileRef = sRef(storage, `media/${Date.now()}_${file.name}`);
        await uploadBytes(fileRef, file);
        fileUrl = await getDownloadURL(fileRef);
        fileType = file.type.startsWith('image/')? 'image' : 'video';
        document.getElementById('fileInput').value = '';
      }

      await push(messagesRef, {user: currentUser.name, userAvatar: currentUser.avatar, text: text || null, fileUrl, fileType, time: Date.now()});
      document.getElementById('msgInput').value = '';
      set(ref(db, `typing/${currentUser.name}`), false);
    };

    function loadMessages() {
      onChildAdded(messagesRef, (snap) => {
        const msg = snap.val();
        if (!msg) return;
        const div = document.createElement('div');
        const isMe = msg.user === currentUser?.name;
        div.className = `msg ${isMe? 'me' : 'other'}`;
        let content = `<div class="name">${msg.userAvatar || '👤'} ${msg.user}</div>`;
        if (msg.text) content += `<div>${escapeHtml(msg.text)}</div>`;
        if (msg.fileUrl) {
          if (msg.fileType === 'image') content += `<img src="${msg.fileUrl}" onclick="window.open('${msg.fileUrl}')">`;
          else if (msg.fileType === 'video') content += `<video src="${msg.fileUrl}" controls></video>`;
          else if (msg.fileType === 'audio') content += `<audio src="${msg.fileUrl}" controls></audio>`;
        }
        content += `<div class="time">${new Date(msg.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'})}</div>`;
        div.innerHTML = content;
        messages.appendChild(div);
        messages.scrollTop = messages.scrollHeight;
      });
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Admin Functions
    window.openAdminModal = () => {
      if (currentUser?.role!== 'owner') return alert("Owner only!");
      loadAdminData();
      document.getElementById('adminModal').style.display = 'flex';
    };
    window.closeAdminModal = () => document.getElementById('adminModal').style.display = 'none';

    async function loadAdminData() {
      // Show codes
      document.getElementById('codeList').innerHTML = Object.entries(USERS).map(([code, u]) =>
        `<div class="code-box"><b>${u.name}</b> → ${code}</div>`
      ).join('');

      // Users status
      const statusSnap = await get(statusRef);
      const statusData = statusSnap.val() || {};
      document.getElementById('totalUsers').innerText = Object.keys(USERS).length;
      document.getElementById('onlineCount').innerText = Object.values(statusData).filter(s => s.online).length;

      document.getElementById('adminUserList').innerHTML = Object.values(USERS).map(u => {
        const stat = statusData[u.name];
        return `<div class="admin-item"><span>${u.avatar} ${u.name}</span><span style="color:${stat?.online? '#00a884' : '#8696a0'}">${stat?.online? '🟢 Online' : '⚫ Offline'}</span></div>`;
      }).join('');

      // Messages
      const msgSnap = await get(messagesRef);
      const msgs = msgSnap.val() || {};
      document.getElementById('adminMsgList').innerHTML = Object.entries(msgs).slice(-15).reverse().map(([key, m]) =>
        `<div class="admin-item"><div><strong>${m.user}:</strong> ${m.text || m.fileType || 'Media'}</div><button class="delete-btn" onclick="window.deleteMessage('${key}')">Del</button></div>`
      ).join('');
    }

    window.deleteMessage = async (key) => {
      if (confirm("Delete message?")) {
        await remove(ref(db, `messages/${key}`));
        loadAdminData();
      }
    };

    window.clearAllChats = async () => {
      if (confirm("⚠️ DELETE ALL MESSAGES?")) {
        await set(messagesRef, null);
        alert("All deleted!");
        loadAdminData();
      }
    };

    window.exportChatHistory = async () => {
      const snap = await get(messagesRef);
      const blob = new Blob([JSON.stringify(snap.val(), null, 2)], {type: 'application/json'});
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `backup_${Date.now()}.json`;
      a.click();
    };

    fileInput.addEventListener('change', () => fileInput.files[0] && sendMsg());
  </script>
</body>
</html>
